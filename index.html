<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost — Dashboards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D1117; color: #E6EDF3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px 24px; }
  h1 { font-size: 24px; font-weight: 900; letter-spacing: 2px; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #8B949E; margin-bottom: 32px; }
  .ghost { color: #E3252B; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card { background: #161B22; border: 1px solid #30363D; border-radius: 12px; padding: 20px; text-decoration: none; color: inherit; display: block; transition: all 0.2s; }
  .card:hover { border-color: #E3252B; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(227,37,43,0.2); }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #F5A623; margin-bottom: 8px; }
  .card-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: #8B949E; line-height: 1.5; }
</style>
</head>
<body>
  <h1>👻 <span class="ghost">Ghost</span> — Dashboards</h1>
  <div class="sub">Rreal Tacos</div>
  <div class="grid">
    <a class="card" href="pulse.html">
      <div class="card-label">Live Ops</div>
      <div class="card-title">⚡ PULSE</div>
      <div class="card-desc">Real-time operations view across all locations.</div>
    </a>
    <a class="card" href="the-league.html">
      <div class="card-label">Mockup</div>
      <div class="card-title">🏆 The League</div>
      <div class="card-desc">Location competition platform. Leaderboard, Power Rankings, and Challenges.</div>
    </a>
  </div>
</body>
</html>
