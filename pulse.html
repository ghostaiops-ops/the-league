<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE — Rreal Tacos Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --void: #050505;
  --deep: #0A0C08;
  --surface: #0F1209;
  --lift: #161A0E;
  --float: #1D2415;
  --gold: #D4A843;
  --gold-hot: #F5C842;
  --gold-glow: rgba(212,168,67,0.15);
  --ember: #C2471A;
  --jade: #22C55E;
  --amber-warn: #F59E0B;
  --red-crit: #DC2626;
  --sand: #EDE8DF;
  --dust: #6B6455;
  --spark: #FFF8E7;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--void);
  font-family: 'Space Grotesk', sans-serif;
  color: var(--sand);
}

/* Loading screen */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  transition: opacity 0.6s ease;
}
#loading.fade-out { opacity: 0; pointer-events: none; }

.loading-logo {
  filter: drop-shadow(0 0 20px rgba(212,168,67,0.6)) drop-shadow(0 0 40px rgba(212,168,67,0.3));
  animation: logo-glow 2s ease-in-out infinite;
}
@keyframes logo-glow {
  0%,100%{filter:drop-shadow(0 0 20px rgba(212,168,67,0.6)) drop-shadow(0 0 40px rgba(212,168,67,0.3))}
  50%{filter:drop-shadow(0 0 30px rgba(212,168,67,0.9)) drop-shadow(0 0 60px rgba(212,168,67,0.5))}
}
.loading-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  color: var(--dust);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.loading-spinner {
  width: 36px; height: 36px;
  border: 2px solid rgba(212,168,67,0.1);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin-slow 1s linear infinite;
}

/* Background radial breathing */
#bg-canvas {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
}

/* Animated background gradient */
#bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 30% 40%, rgba(212,168,67,0.03) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(194,71,26,0.02) 0%, transparent 50%),
              var(--void);
  animation: ember-breathe 8s ease-in-out infinite;
}
@keyframes ember-breathe {
  0%,100%{background:radial-gradient(ellipse at 30% 40%, rgba(212,168,67,0.03) 0%, transparent 60%),radial-gradient(ellipse at 70% 70%, rgba(194,71,26,0.02) 0%, transparent 50%),var(--void)}
  33%{background:radial-gradient(ellipse at 50% 30%, rgba(212,168,67,0.04) 0%, transparent 60%),radial-gradient(ellipse at 60% 80%, rgba(194,71,26,0.03) 0%, transparent 50%),var(--void)}
  66%{background:radial-gradient(ellipse at 20% 60%, rgba(212,168,67,0.025) 0%, transparent 60%),radial-gradient(ellipse at 80% 40%, rgba(194,71,26,0.015) 0%, transparent 50%),var(--void)}
}

/* Leaflet map */
#map {
  position: fixed; inset: 0; z-index: 2;
}
.leaflet-container { background: var(--void) !important; }

/* Top bar pill */
#top-bar {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  background: rgba(10,12,8,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 100px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,168,67,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 20px;
  white-space: nowrap;
  animation: float-in 0.6s ease both;
}

.top-bar-logo { height: 28px; display: flex; align-items: center; }
.top-bar-sep {
  width: 1px; height: 28px;
  background: linear-gradient(to bottom, transparent, rgba(212,168,67,0.4), transparent);
}
.top-bar-kpis { display: flex; align-items: center; gap: 20px; }
.kpi-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.kpi-val {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  color: var(--sand);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.kpi-label {
  font-size: 7px; font-weight: 500;
  color: var(--dust);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
.live-indicator { display: flex; align-items: center; gap: 6px; }
.live-dot {
  width: 6px; height: 6px;
  background: var(--jade);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--jade), 0 0 12px rgba(34,197,94,0.4);
  animation: live-pulse 2s ease-in-out infinite;
}
@keyframes live-pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.8)}
}
.live-text { font-size: 8px; color: var(--dust); text-transform: uppercase; letter-spacing: 0.15em; }
.refresh-btn {
  width: 28px; height: 28px;
  background: rgba(212,168,67,0.1);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  color: var(--gold);
  font-size: 12px;
}
.refresh-btn:hover { background: rgba(212,168,67,0.2); border-color: rgba(212,168,67,0.4); }
.refresh-btn.spinning svg { animation: spin-slow 0.8s linear infinite; }

/* Left panel */
#left-panel {
  position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
  z-index: 100;
  width: 220px;
  background: rgba(10,12,8,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,168,67,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 18px;
  animation: breathe 4s ease-in-out infinite, float-in 0.8s ease 0.2s both;
}
@keyframes breathe {
  0%,100%{transform:translateY(-50%) scale(1)}
  50%{transform:translateY(-50%) scale(1.004)}
}
.panel-header {
  font-size: 9px; font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 12px;
}
.panel-divider {
  height: 1px;
  background: linear-gradient(to right, rgba(212,168,67,0.3), transparent);
  margin-bottom: 14px;
}
.vital-row { margin-bottom: 14px; }
.vital-row:last-child { margin-bottom: 0; }
.vital-label {
  font-size: 8px; color: var(--dust);
  text-transform: uppercase; letter-spacing: 0.12em;
  margin-bottom: 2px;
}
.vital-val {
  font-family: 'Space Mono', monospace;
  font-size: 20px; font-weight: 700;
  color: var(--sand);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 4px;
}
.vital-bar-track {
  height: 2px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}
.vital-bar-fill {
  height: 100%;
  background: linear-gradient(to right, var(--gold), var(--gold-hot));
  border-radius: 2px;
  width: 0%;
  transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 6px rgba(212,168,67,0.5);
}
.vital-bar-fill.jade { background: linear-gradient(to right, var(--jade), #4ade80); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.vital-bar-fill.ember { background: linear-gradient(to right, var(--ember), #e55a2b); box-shadow: 0 0 6px rgba(194,71,26,0.5); }

/* Bottom cards strip */
#bottom-strip {
  position: fixed; bottom: 20px; left: 20px; right: 20px;
  z-index: 100;
  display: flex; gap: 12px;
  overflow-x: auto; overflow-y: hidden;
  padding-bottom: 4px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  transition: right 0.4s cubic-bezier(0.16,1,0.3,1);
  animation: float-in 0.8s ease 0.4s both;
}
#bottom-strip::-webkit-scrollbar { display: none; }
#bottom-strip.panel-open { right: 400px; }

.loc-card {
  min-width: 180px;
  height: 90px;
  background: rgba(10,12,8,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px 14px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  position: relative;
  flex-shrink: 0;
  display: flex; flex-direction: column; justify-content: space-between;
  overflow: hidden;
}
.loc-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 14px 0 0 14px;
}
.loc-card.ok::before { background: var(--jade); box-shadow: 2px 0 8px rgba(34,197,94,0.4); }
.loc-card.warn::before { background: var(--amber-warn); box-shadow: 2px 0 8px rgba(245,158,11,0.4); }
.loc-card.critical::before { background: var(--red-crit); box-shadow: 2px 0 8px rgba(220,38,38,0.4); }
.loc-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
.loc-card:hover.ok { border-color: rgba(34,197,94,0.3); }
.loc-card:hover.warn { border-color: rgba(245,158,11,0.3); }
.loc-card:hover.critical { border-color: rgba(220,38,38,0.3); }
.loc-card.selected {
  border-color: rgba(212,168,67,0.5) !important;
  box-shadow: 0 0 20px rgba(212,168,67,0.15), 0 12px 40px rgba(0,0,0,0.6);
  transform: scale(1.02);
}
.loc-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.loc-card-name {
  font-size: 12px; font-weight: 600;
  color: var(--sand);
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.status-badge {
  font-size: 7px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 2px 6px; border-radius: 100px;
}
.status-badge.ok { color: var(--jade); background: rgba(34,197,94,0.12); }
.status-badge.warn { color: var(--amber-warn); background: rgba(245,158,11,0.12); }
.status-badge.critical { color: var(--red-crit); background: rgba(220,38,38,0.12); animation: badge-blink 1.5s ease-in-out infinite; }
@keyframes badge-blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.loc-card-sales {
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700;
  color: var(--sand);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em;
}
.loc-card-covers {
  font-size: 9px; color: var(--dust);
  margin-top: 1px;
}

/* Right slide panel */
#side-panel {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 380px; z-index: 200;
  background: rgba(8,10,6,0.96);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-left: 1px solid rgba(212,168,67,0.15);
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,168,67,0.2) transparent;
}
#side-panel::-webkit-scrollbar { width: 4px; }
#side-panel::-webkit-scrollbar-track { background: transparent; }
#side-panel::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.2); border-radius: 2px; }
#side-panel.open { transform: translateX(0); }

/* Panel hero */
.panel-hero {
  position: relative; height: 220px;
  overflow: hidden;
  flex-shrink: 0;
}
.panel-hero-img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}
.panel-hero-fallback {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--lift), var(--float));
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}
.panel-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 30%, rgba(8,10,6,0.95) 100%);
}
.panel-hero-name {
  position: absolute; bottom: 16px; left: 20px;
  font-size: 26px; font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  letter-spacing: -0.02em;
  line-height: 1;
}
.panel-hero-status {
  position: absolute; bottom: 22px; right: 20px;
}
.panel-close {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  transition: all 0.2s;
  z-index: 10;
}
.panel-close:hover { background: rgba(220,38,38,0.4); border-color: rgba(220,38,38,0.5); color: #fff; }

/* Panel content */
.panel-content { padding: 20px; }
.panel-section { margin-bottom: 24px; }
.panel-section-title {
  font-size: 8px; font-weight: 600;
  color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-bottom: 12px;
}

/* Metrics grid */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.metric-box {
  background: var(--lift);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 12px;
  transition: border-color 0.2s;
}
.metric-box:hover { border-color: rgba(212,168,67,0.2); }
.metric-box-val {
  font-family: 'Space Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: var(--sand);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 4px;
}
.metric-box-label {
  font-size: 8px; font-weight: 500;
  color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.15em;
}
.metric-box-val.ok { color: var(--jade); }
.metric-box-val.warn { color: var(--amber-warn); }
.metric-box-val.critical { color: var(--red-crit); }

/* Daypart bars */
.daypart-bars { display: flex; gap: 10px; }
.daypart-bar-wrap { flex: 1; }
.daypart-bar-label {
  font-size: 8px; color: var(--dust);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.daypart-bar-amount {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  color: var(--sand); margin-bottom: 2px;
}
.daypart-bar-covers { font-size: 8px; color: var(--dust); margin-bottom: 6px; }
.daypart-track {
  height: 6px; background: rgba(255,255,255,0.05);
  border-radius: 3px; overflow: hidden;
}
.daypart-fill {
  height: 100%; width: 0%;
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.16,1,0.3,1) 0.2s;
}
.daypart-fill.lunch { background: linear-gradient(to right, var(--gold), var(--gold-hot)); box-shadow: 0 0 8px rgba(212,168,67,0.6); }
.daypart-fill.dinner { background: linear-gradient(to right, var(--amber-warn), #fbbf24); box-shadow: 0 0 8px rgba(245,158,11,0.6); }

/* Dining mix */
.mix-row { margin-bottom: 10px; }
.mix-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.mix-row-label { font-size: 9px; color: var(--dust); text-transform: uppercase; letter-spacing: 0.1em; }
.mix-row-pct { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--sand); }
.mix-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.mix-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 1s cubic-bezier(0.16,1,0.3,1) 0.3s; }
.mix-fill.dine-in { background: var(--jade); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.mix-fill.takeout { background: var(--gold); box-shadow: 0 0 6px rgba(212,168,67,0.5); }
.mix-fill.delivery { background: var(--ember); box-shadow: 0 0 6px rgba(194,71,26,0.5); }

/* Flags */
.flag-list { display: flex; flex-direction: column; gap: 6px; }
.flag-pill {
  padding: 8px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  border-left: 3px solid var(--dust);
  font-size: 11px; color: var(--sand);
  line-height: 1.4;
}
.flag-pill.critical { border-left-color: var(--red-crit); background: rgba(220,38,38,0.06); }
.flag-pill.warn { border-left-color: var(--amber-warn); background: rgba(245,158,11,0.06); }
.flag-pill.info { border-left-color: var(--dust); }
.flag-empty { font-size: 11px; color: var(--dust); font-style: italic; }

/* Map orb styles */
.orb-container {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
  cursor: pointer;
  filter: none;
}
.orb-sales-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  white-space: nowrap;
  margin-bottom: 2px;
  font-variant-numeric: tabular-nums;
}
.orb-wrapper {
  position: relative;
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
}
.orb-ring-outer {
  position: absolute;
  width: 48px; height: 48px;
  border-radius: 50%;
  animation: orb-pulse-slow 4s ease-in-out infinite;
}
.orb-ring-mid {
  position: absolute;
  width: 28px; height: 28px;
  border-radius: 50%;
  animation: orb-pulse-mid 3s ease-in-out infinite;
}
.orb-ring-crit2 {
  position: absolute;
  width: 56px; height: 56px;
  border-radius: 50%;
  animation: orb-pulse-slow 2.5s ease-in-out infinite;
  animation-delay: -1.25s;
}
.orb-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  position: relative; z-index: 2;
  box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
}
.orb-name-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px; font-weight: 500;
  color: var(--sand);
  letter-spacing: 0.05em;
  white-space: nowrap;
  margin-top: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.orb-crit-indicator {
  font-size: 10px;
  position: absolute;
  top: -4px; right: -4px;
  z-index: 3;
}

/* Animations */
@keyframes orb-pulse-slow {
  0%,100%{transform:scale(1);opacity:0.15}
  50%{transform:scale(1.4);opacity:0.05}
}
@keyframes orb-pulse-mid {
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.2);opacity:0.1}
}
@keyframes float-in {
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes spin-slow { to{transform:rotate(360deg)} }
@keyframes panel-slide-in {
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.panel-animate { animation: panel-slide-in 0.4s ease both; }

/* Ovation stars */
.star-rating { color: var(--gold-hot); letter-spacing: 0.1em; }

/* Responsive hide on small */
@media(max-width:768px){
  #left-panel{display:none}
  #top-bar{padding:8px 16px;gap:12px}
  .top-bar-kpis{gap:12px}
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <svg class="loading-logo" width="180" height="48" viewBox="0 0 180 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="36" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="-1">Rreal</text>
    <text x="84" y="36" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="300" fill="#D4A843" letter-spacing="-1">Tacos</text>
  </svg>
  <div class="loading-spinner"></div>
  <div class="loading-text">Initializing operations feed...</div>
</div>

<!-- Background gradient -->
<div id="bg-gradient"></div>

<!-- Particle canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Leaflet map -->
<div id="map"></div>

<!-- Top bar pill -->
<div id="top-bar">
  <div class="top-bar-logo">
    <svg width="90" height="24" viewBox="0 0 90 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="18" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="-0.5">Rreal</text>
      <text x="42" y="18" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="300" fill="#D4A843" letter-spacing="-0.5">Tacos</text>
    </svg>
  </div>
  <div class="top-bar-sep"></div>
  <div class="top-bar-kpis">
    <div class="kpi-item">
      <div class="kpi-val" id="tb-sales">—</div>
      <div class="kpi-label">Total Sales</div>
    </div>
    <div class="kpi-item">

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const COORDS = {
  'Midtown':       [33.7823, -84.3838],
  'West Midtown':  [33.7756, -84.4134],
  'Chamblee':      [33.8876, -84.3044],
  'Sandy Springs': [33.9303, -84.3697],
  'Cumming':       [34.2073, -84.1400],
  'Sugar Hill':    [34.1154, -84.0538],
  'Buckhead':      [33.8437, -84.3677],
  'Decatur':       [33.7748, -84.2963],
  'Lawrenceville': [33.9562, -83.9880],
  'Beltline':      [33.7490, -84.3880],
  'Duluth':        [34.0021, -84.1449],
  'Woodstock':     [34.1015, -84.5194],
};

const PHOTOS = {
  'Midtown':'/location-photos/midtown.jpg',
  'West Midtown':'/location-photos/west_midtown.jpg',
  'Chamblee':'/location-photos/chamblee.jpg',
  'Sandy Springs':'/location-photos/sandy_springs.jpg',
  'Cumming':'/location-photos/cumming.jpg',
  'Sugar Hill':'/location-photos/sugar_hill.jpg',
  'Buckhead':'/location-photos/buckhead.jpg',
  'Decatur':'/location-photos/decatur.jpg',
  'Lawrenceville':'/location-photos/lawrenceville.jpg',
  'Beltline':'/location-photos/beltline.jpg',
  'Duluth':'/location-photos/duluth_official.webp',
  'Woodstock':'/location-photos/woodstock.jpg',
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmt$ = n => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits: 0});
const fmtPct = n => n == null ? '—' : Number(n).toFixed(1) + '%';
const fmtNum = n => n == null ? '—' : Number(n).toLocaleString('en-US');

function getHealth(loc) {
  const labor = loc.labor?.laborPct;
  const flags = loc.flags || [];
  if (labor > 30 || flags.some(f => /incident|injury|fire|safety/.test(f.toLowerCase()))) return 'critical';
  if (labor > 22 || flags.length > 2) return 'warn';
  return 'ok';
}

function classifyFlag(f) {
  const t = f.toLowerCase();
  if (/incident|injury|hair|fire|safety|critical|blood|hurt|mirror/.test(t)) return 'critical';
  if (/labor|comp|void|sick|broken|lemon|missing|delay/.test(t)) return 'warn';
  return 'info';
}

function getHealthColor(h) {
  if (h === 'critical') return '#DC2626';
  if (h === 'warn') return '#F59E0B';
  return '#22C55E';
}

function animateCount(el, target, prefix = '$', duration = 900) {
  if (target == null || isNaN(target)) { el.textContent = '—'; return; }
  const start = performance.now();
  const update = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = Math.round(target * ease);
    el.textContent = prefix + val.toLocaleString();
    if (p < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

function animatePct(el, target, duration = 900) {
  if (target == null || isNaN(target)) { el.textContent = '—'; return; }
  const start = performance.now();
  const update = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = (target * ease).toFixed(1) + '%';
    if (p < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let dashData = null;
let selectedLoc = null;
let mapMarkers = {};
let leafletMap = null;

// ─── PARTICLE SYSTEM ─────────────────────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
const NUM_PARTICLES = 35;
const particles = [];

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * window.innerWidth;
    this.y = Math.random() * window.innerHeight;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.04 + 0.01;
    this.color = Math.random() > 0.6 ? '#D4A843' : '#EDE8DF';
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > window.innerWidth || this.y < 0 || this.y > window.innerHeight) this.reset();
  }
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initParticles() {
  resizeCanvas();
  for (let i = 0; i < NUM_PARTICLES; i++) particles.push(new Particle());
}

function renderParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    p.update();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.opacity;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(renderParticles);
}

window.addEventListener('resize', resizeCanvas);

// ─── MAP SETUP ────────────────────────────────────────────────────────────────
function initMap() {
  leafletMap = L.map('map', {
    center: [33.92, -84.25],
    zoom: 10,
    zoomControl: false,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(leafletMap);

  L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);

  // Style zoom controls
  setTimeout(() => {
    const zoomBtns = document.querySelectorAll('.leaflet-control-zoom a');
    zoomBtns.forEach(b => {
      b.style.background = 'rgba(10,12,8,0.85)';
      b.style.backdropFilter = 'blur(16px)';
      b.style.border = '1px solid rgba(212,168,67,0.2)';
      b.style.color = '#EDE8DF';
    });
  }, 100);
}

// ─── ORB PINS ─────────────────────────────────────────────────────────────────
function createOrbIcon(loc, health, sales) {
  const color = getHealthColor(health);
  const isCrit = health === 'critical';
  const salesStr = sales != null ? '$' + Number(sales).toLocaleString('en-US', {maximumFractionDigits:0}) : '—';

  const html = `
    <div class="orb-container" style="z-index:${isCrit?999:1}">
      <div class="orb-sales-label" style="color:${color};text-shadow:0 0 8px ${color}66">${salesStr}</div>
      <div class="orb-wrapper">
        ${isCrit ? `<div class="orb-ring-crit2" style="background:radial-gradient(circle,${color}26,transparent 70%)"></div>` : ''}
        <div class="orb-ring-outer" style="background:radial-gradient(circle,${color}26,transparent 70%)"></div>
        <div class="orb-ring-mid" style="background:radial-gradient(circle,${color}4D,transparent 70%)"></div>
        <div class="orb-dot" style="background:${color};color:${color}">
          ${isCrit ? '<div class="orb-crit-indicator">◉</div>' : ''}
        </div>
      </div>
      <div class="orb-name-label">${loc.name || ''}</div>
    </div>
  `;

  return L.divIcon({
    html,
    className: '',
    iconSize: [80, 72],
    iconAnchor: [40, 36],
  });
}

function refreshPins() {
  if (!dashData || !leafletMap) return;
  const locs = dashData.toast?.locations || [];

  // Clear existing
  Object.values(mapMarkers).forEach(m => leafletMap.removeLayer(m));
  mapMarkers = {};

  locs.forEach(loc => {
    const name = loc.name;
    const coords = COORDS[name];
    if (!coords) return;

    const health = getHealth(loc);
    const sales = loc.sales?.netSales ?? loc.netSales ?? null;
    const icon = createOrbIcon(loc, health, sales);

    const marker = L.marker(coords, { icon, zIndexOffset: health === 'critical' ? 1000 : 0 });
    marker.on('click', () => openPanel(loc));
    marker.addTo(leafletMap);
    mapMarkers[name] = marker;
  });
}

// ─── BOTTOM CARDS ─────────────────────────────────────────────────────────────
function renderCards() {
  if (!dashData) return;
  const locs = dashData.toast?.locations || [];
  const strip = document.getElementById('bottom-strip');
  strip.innerHTML = '';

  locs.forEach((loc, i) => {
    const health = getHealth(loc);
    const sales = loc.sales?.netSales ?? loc.netSales ?? null;
    const covers = loc.sales?.covers ?? loc.covers ?? null;
    const isSelected = selectedLoc && selectedLoc.name === loc.name;

    const card = document.createElement('div');
    card.className = `loc-card ${health}${isSelected ? ' selected' : ''}`;
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="loc-card-top">
        <div class="loc-card-name">${loc.name}</div>
        <div class="status-badge ${health}">${health === 'ok' ? 'OK' : health === 'warn' ? 'WARN' : 'CRIT'}</div>
      </div>
      <div>
        <div class="loc-card-sales">${fmt$(sales)}</div>
        <div class="loc-card-covers">${covers != null ? fmtNum(covers) + ' covers' : ''}</div>
      </div>
    `;
    card.addEventListener('click', () => openPanel(loc));
    strip.appendChild(card);
  });
}

// ─── TOP BAR & VITALS ────────────────────────────────────────────────────────
function updateTopBar() {
  if (!dashData) return;
  const locs = dashData.toast?.locations || [];

  let totalSales = 0, totalCovers = 0;
  locs.forEach(loc => {
    const s = loc.sales?.netSales ?? loc.netSales ?? 0;
    const c = loc.sales?.covers ?? loc.covers ?? 0;
    totalSales += s;
    totalCovers += c;
  });

  // Rating from ovation
  let rating = null;
  if (dashData.ovation?.overallRating) rating = dashData.ovation.overallRating;
  else if (dashData.sunday?.avgRating) rating = dashData.sunday.avgRating;

  // Tip rate
  let tipRate = null;
  if (dashData.toast?.tipRate) tipRate = dashData.toast.tipRate;

  const tbSales = document.getElementById('tb-sales');
  const tbCovers = document.getElementById('tb-covers');
  animateCount(tbSales, totalSales, '$', 1200);
  animateCount(tbCovers, totalCovers, '', 1200);

  document.getElementById('tb-rating').textContent = rating ? '★ ' + Number(rating).toFixed(2) : '—';
  document.getElementById('tb-tip').textContent = tipRate ? fmtPct(tipRate) : '—';
}

function updateVitals() {
  if (!dashData) return;
  const locs = dashData.toast?.locations || [];

  let totalSales = 0, totalCovers = 0, reporting = 0, alerts = 0;
  locs.forEach(loc => {
    const s = loc.sales?.netSales ?? loc.netSales ?? 0;
    const c = loc.sales?.covers ?? loc.covers ?? 0;
    totalSales += s;
    totalCovers += c;
    if (s > 0) reporting++;
    alerts += (loc.flags || []).length;
  });
  const avgGuest = totalCovers > 0 ? totalSales / totalCovers : 0;
  const totalLocs = locs.length;

  const vitSales = document.getElementById('vit-sales');
  const vitCovers = document.getElementById('vit-covers');
  const vitAvg = document.getElementById('vit-avg');
  const vitLocs = document.getElementById('vit-locs');
  const vitAlerts = document.getElementById('vit-alerts');

  animateCount(vitSales, totalSales, '$', 1000);
  animateCount(vitCovers, totalCovers, '', 1000);
  animateCount(vitAvg, Math.round(avgGuest), '$', 1000);

  // Locs reporting animate
  const startLoc = performance.now();
  const updateLoc = (now) => {
    const p = Math.min((now - startLoc) / 1000, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    vitLocs.textContent = Math.round(reporting * ease) + ' / ' + totalLocs;
    if (p < 1) requestAnimationFrame(updateLoc);
  };
  requestAnimationFrame(updateLoc);

  const startAl = performance.now();
  const updateAl = (now) => {
    const p = Math.min((now - startAl) / 800, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    vitAlerts.textContent = Math.round(alerts * ease).toString();
    if (p < 1) requestAnimationFrame(updateAl);
  };
  requestAnimationFrame(updateAl);

  // Bar fills
  setTimeout(() => {
    document.getElementById('vit-sales-bar').style.width = '85%';
    document.getElementById('vit-covers-bar').style.width = '70%';
    document.getElementById('vit-avg-bar').style.width = '60%';
    document.getElementById('vit-locs-bar').style.width = (reporting / Math.max(totalLocs, 1) * 100) + '%';
    document.getElementById('vit-alerts-bar').style.width = Math.min(alerts * 10, 100) + '%';
  }, 200);
}

// ─── RIGHT PANEL ──────────────────────────────────────────────────────────────
function openPanel(loc) {
  selectedLoc = loc;
  renderCards();

  const panel = document.getElementById('side-panel');
  const strip = document.getElementById('bottom-strip');

  // Hero photo
  const heroImg = document.getElementById('panel-hero-img');
  const heroFallback = document.getElementById('panel-hero-fallback');
  const photo = PHOTOS[loc.name];
  if (photo) {
    heroImg.src = photo;
    heroImg.style.display = 'block';
    heroFallback.style.display = 'none';
  } else {
    heroImg.style.display = 'none';
    heroFallback.style.display = 'flex';
  }

  document.getElementById('panel-loc-name').textContent = loc.name;

  const health = getHealth(loc);
  const statusEl = document.getElementById('panel-loc-status');
  statusEl.innerHTML = `<span class="status-badge ${health}" style="font-size:9px;padding:4px 10px">${health.toUpperCase()}</span>`;

  // Build panel body
  const body = document.getElementById('panel-body');

  const sales = loc.sales?.netSales ?? loc.netSales ?? null;
  const covers = loc.sales?.covers ?? loc.covers ?? null;
  const avgGuest = (sales && covers && covers > 0) ? sales / covers : null;
  const laborPct = loc.labor?.laborPct ?? null;
  const laborClass = laborPct > 30 ? 'critical' : laborPct > 22 ? 'warn' : 'ok';

  const lunch = loc.dayparts?.lunch ?? loc.lunch ?? null;
  const dinner = loc.dayparts?.dinner ?? loc.dinner ?? null;
  const lunchSales = lunch?.sales ?? null;
  const lunchCovers = lunch?.covers ?? null;
  const dinnerSales = dinner?.sales ?? null;
  const dinnerCovers = dinner?.covers ?? null;
  const maxDaypart = Math.max(lunchSales || 0, dinnerSales || 0, 1);
  const lunchW = lunchSales ? (lunchSales / maxDaypart * 100) : 0;
  const dinnerW = dinnerSales ? (dinnerSales / maxDaypart * 100) : 0;

  const dineIn = loc.diningMix?.dineIn ?? loc.dineIn ?? null;
  const takeout = loc.diningMix?.takeout ?? loc.takeout ?? null;
  const delivery = loc.diningMix?.delivery ?? loc.delivery ?? null;

  const flags = loc.flags || [];

  body.innerHTML = `
    <div class="panel-section panel-animate" style="animation-delay:0.05s">
      <div class="panel-section-title">Key Metrics</div>
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-box-val" id="pm-sales">—</div>
          <div class="metric-box-label">Net Sales</div>
        </div>
        <div class="metric-box">
          <div class="metric-box-val" id="pm-avg">—</div>
          <div class="metric-box-label">Avg / Guest</div>
        </div>
        <div class="metric-box">
          <div class="metric-box-val ${laborClass}" id="pm-labor">—</div>
          <div class="metric-box-label">Labor %</div>
        </div>
        <div class="metric-box">
          <div class="metric-box-val" id="pm-covers">—</div>
          <div class="metric-box-label">Covers</div>
        </div>
      </div>
    </div>

    <div class="panel-section panel-animate" style="animation-delay:0.1s">
      <div class="panel-section-title">Daypart</div>
      <div class="daypart-bars">
        <div class="daypart-bar-wrap">
          <div class="daypart-bar-label">Lunch</div>
          <div class="daypart-bar-amount">${fmt$(lunchSales)}</div>
          <div class="daypart-bar-covers">${lunchCovers != null ? fmtNum(lunchCovers) + ' covers' : ''}</div>
          <div class="daypart-track"><div class="daypart-fill lunch" id="dp-lunch" style="width:0%"></div></div>
        </div>
        <div class="daypart-bar-wrap">
          <div class="daypart-bar-label">Dinner</div>
          <div class="daypart-bar-amount">${fmt$(dinnerSales)}</div>
          <div class="daypart-bar-covers">${dinnerCovers != null ? fmtNum(dinnerCovers) + ' covers' : ''}</div>
          <div class="daypart-track"><div class="daypart-fill dinner" id="dp-dinner" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div class="panel-section panel-animate" style="animation-delay:0.15s">
      <div class="panel-section-title">Dining Mix</div>
      <div class="mix-row">
        <div class="mix-row-top">
          <div class="mix-row-label">Dine-In</div>
          <div class="mix-row-pct">${dineIn != null ? fmtPct(dineIn) : '—'}</div>
        </div>
        <div class="mix-track"><div class="mix-fill dine-in" id="mix-dinein" style="width:0%"></div></div>
      </div>
      <div class="mix-row">
        <div class="mix-row-top">
          <div class="mix-row-label">Takeout</div>
          <div class="mix-row-pct">${takeout != null ? fmtPct(takeout) : '—'}</div>
        </div>
        <div class="mix-track"><div class="mix-fill takeout" id="mix-takeout" style="width:0%"></div></div>
      </div>
      <div class="mix-row">
        <div class="mix-row-top">
          <div class="mix-row-label">Delivery</div>
          <div class="mix-row-pct">${delivery != null ? fmtPct(delivery) : '—'}</div>
        </div>
        <div class="mix-track"><div class="mix-fill delivery" id="mix-delivery" style="width:0%"></div></div>
      </div>
    </div>

    ${flags.length > 0 ? `
    <div class="panel-section panel-animate" style="animation-delay:0.2s">
      <div class="panel-section-title">Flags</div>
      <div class="flag-list">
        ${flags.map(f => {
          const cls = classifyFlag(f);
          return `<div class="flag-pill ${cls}">${f}</div>`;
        }).join('')}
      </div>
    </div>` : `
    <div class="panel-section panel-animate" style="animation-delay:0.2s">
      <div class="panel-section-title">Flags</div>
      <div class="flag-empty">No flags — all clear.</div>
    </div>`}
  `;

  // Open panel
  panel.classList.add('open');
  strip.classList.add('panel-open');

  // Animate metrics
  requestAnimationFrame(() => {
    setTimeout(() => {
      if (sales != null) animateCount(document.getElementById('pm-sales'), sales, '$', 800);
      if (avgGuest != null) animateCount(document.getElementById('pm-avg'), Math.round(avgGuest), '$', 700);
      if (laborPct != null) animatePct(document.getElementById('pm-labor'), laborPct, 700);
      if (covers != null) animateCount(document.getElementById('pm-covers'), covers, '', 800);

      // Daypart bars
      setTimeout(() => {
        const dl = document.getElementById('dp-lunch');
        const dd = document.getElementById('dp-dinner');
        if (dl) dl.style.width = lunchW + '%';
        if (dd) dd.style.width = dinnerW + '%';

        // Mix bars
        const mdi = document.getElementById('mix-dinein');
        const mto = document.getElementById('mix-takeout');
        const mde = document.getElementById('mix-delivery');
        if (mdi) mdi.style.width = (dineIn || 0) + '%';
        if (mto) mto.style.width = (takeout || 0) + '%';
        if (mde) mde.style.width = (delivery || 0) + '%';
      }, 200);
    }, 100);
  });
}

function closePanel() {
  document.getElementById('side-panel').style.transform = 'translateX(100%)';
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('bottom-strip').classList.remove('panel-open');
  selectedLoc = null;
  renderCards();
  refreshPins();
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/dashboard/all');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    dashData = await res.json();
  } catch (err) {
    console.warn('[PULSE] API unavailable, using demo data:', err.message);
    dashData = getDemoData();
  }

  updateTopBar();
  updateVitals();
  renderCards();
  refreshPins();
}

function triggerRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  loadData().finally(() => {
    setTimeout(() => btn.classList.remove('spinning'), 600);
  });
}

// ─── DEMO DATA ────────────────────────────────────────────────────────────────
function getDemoData() {
  const locNames = Object.keys(COORDS);
  const locations = locNames.map((name, i) => {
    const baseSales = 8000 + Math.random() * 12000;
    const covers = Math.round(baseSales / (12 + Math.random() * 6));
    const laborPct = 16 + Math.random() * 18;
    const flagSets = [
      [],
      [],
      ['Labor over target', 'Late delivery'],
      ['Void spike noted'],
      ['Incident: minor cut reported', 'Labor over threshold'],
      [],
      ['Broken prep equipment'],
      [],
    ];
    const flags = flagSets[i % flagSets.length];
    const lunchSales = baseSales * (0.4 + Math.random() * 0.2);
    const dinnerSales = baseSales - lunchSales;
    const lunchCovers = Math.round(covers * 0.45);
    const dinnerCovers = covers - lunchCovers;
    const dineIn = 50 + Math.random() * 20;
    const takeout = 20 + Math.random() * 15;
    const delivery = 100 - dineIn - takeout;

    return {
      name,
      sales: { netSales: Math.round(baseSales), covers },
      labor: { laborPct: Math.round(laborPct * 10) / 10 },
      flags,
      dayparts: {
        lunch: { sales: Math.round(lunchSales), covers: lunchCovers },
        dinner: { sales: Math.round(dinnerSales), covers: dinnerCovers },
      },
      diningMix: {
        dineIn: Math.round(dineIn * 10) / 10,
        takeout: Math.round(takeout * 10) / 10,
        delivery: Math.round(Math.max(delivery, 0) * 10) / 10,
      },
    };
  });

  return {
    toast: { locations, tipRate: 19.4 },
    ovation: { overallRating: 4.71 },
    sunday: {},
  };
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
function boot() {
  initParticles();
  renderParticles();
  initMap();

  // Load data + dismiss loading
  const loadingEl = document.getElementById('loading');

  const failsafe = setTimeout(() => {
    loadingEl.classList.add('fade-out');
    setTimeout(() => loadingEl.style.display = 'none', 600);
  }, 12000);

  loadData().then(() => {
    clearTimeout(failsafe);
    setTimeout(() => {
      loadingEl.classList.add('fade-out');
      setTimeout(() => loadingEl.style.display = 'none', 600);
    }, 600);
  });

  // Auto-refresh every 5 minutes
  setInterval(() => loadData(), 5 * 60 * 1000);
}

document.addEventListener('DOMContentLoaded', boot);
</script>
