<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PULSE — Rreal Tacos Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --void: #050505;
  --deep: #0A0C08;
  --surface: #0F1209;
  --lift: #161A0E;
  --float: #1D2415;
  --gold: #D4A843;
  --gold-hot: #F5C842;
  --gold-glow: rgba(212,168,67,0.15);
  --ember: #C2471A;
  --jade: #22C55E;
  --amber-warn: #F59E0B;
  --red-crit: #DC2626;
  --sand: #EDE8DF;
  --dust: #6B6455;
  --spark: #FFF8E7;
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--void);
  font-family:'Space Grotesk',sans-serif;
  color:var(--sand);
  -webkit-tap-highlight-color: transparent;
}

/* ── LOADING ─────────────────────────────────────── */
#loading {
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  transition:opacity 0.6s ease;
}
#loading.fade-out{opacity:0;pointer-events:none}
.loading-logo{filter:drop-shadow(0 0 20px rgba(212,168,67,0.6));animation:logo-glow 2s ease-in-out infinite}
@keyframes logo-glow{0%,100%{filter:drop-shadow(0 0 20px rgba(212,168,67,0.6))}50%{filter:drop-shadow(0 0 30px rgba(212,168,67,0.9))}}
.loading-text{font-size:11px;color:var(--dust);letter-spacing:.15em;text-transform:uppercase}
.loading-spinner{width:36px;height:36px;border:2px solid rgba(212,168,67,.1);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAP ─────────────────────────────────────────── */
#bg-gradient{position:fixed;inset:0;z-index:0;background:var(--void)}
#bg-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
#map{position:fixed;inset:0;z-index:2}
.leaflet-container{background:var(--void)!important}

/* ── TOP BAR ─────────────────────────────────────── */
#top-bar {
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  z-index:100;
  background:rgba(10,12,8,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(212,168,67,0.2);
  border-radius:100px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.04);
  padding:8px 16px;
  display:flex;align-items:center;gap:12px;
  white-space:nowrap;
  max-width:calc(100vw - 24px);
  overflow:hidden;
}
.top-bar-logo{height:24px;display:flex;align-items:center;flex-shrink:0}
.top-bar-sep{width:1px;height:24px;background:linear-gradient(to bottom,transparent,rgba(212,168,67,0.4),transparent);flex-shrink:0}
.top-bar-kpis{display:flex;align-items:center;gap:0;overflow:hidden}
.kpi-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 10px;flex-shrink:0}
.kpi-item + .kpi-item{border-left:1px solid rgba(255,255,255,0.06)}
.kpi-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--sand);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kpi-label{font-size:7px;font-weight:500;color:var(--dust);text-transform:uppercase;letter-spacing:.12em}
.live-dot{width:6px;height:6px;background:var(--jade);border-radius:50%;box-shadow:0 0 6px var(--jade),0 0 12px rgba(34,197,94,0.4);animation:live-pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes live-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.refresh-btn{width:26px;height:26px;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.2);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:11px;flex-shrink:0;transition:all .2s}
.refresh-btn:hover{background:rgba(212,168,67,0.2)}
.refresh-btn.spinning svg{animation:spin .8s linear infinite}

/* ── LEFT PANEL (desktop only) ───────────────────── */
#left-panel {
  position:fixed;left:20px;top:50%;transform:translateY(-50%);
  z-index:100;width:210px;
  background:rgba(10,12,8,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(212,168,67,0.15);border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6);padding:18px;
}
.panel-header{font-size:9px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.2em;margin-bottom:12px}
.panel-divider{height:1px;background:linear-gradient(to right,rgba(212,168,67,0.3),transparent);margin-bottom:14px}
.vital-row{margin-bottom:14px}
.vital-row:last-child{margin-bottom:0}
.vital-label{font-size:8px;color:var(--dust);text-transform:uppercase;letter-spacing:.12em;margin-bottom:2px}
.vital-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--sand);line-height:1;margin-bottom:4px}
.vital-bar-track{height:2px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.vital-bar-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-hot));border-radius:2px;width:0%;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.vital-bar-fill.jade{background:linear-gradient(to right,var(--jade),#4ade80)}
.vital-bar-fill.ember{background:linear-gradient(to right,var(--ember),#e55a2b)}

/* ── BOTTOM STRIP ────────────────────────────────── */
#bottom-strip {
  position:fixed;bottom:0;left:0;right:0;
  z-index:100;
  display:flex;gap:10px;
  overflow-x:auto;overflow-y:hidden;
  padding:12px 16px 20px;
  padding-bottom:max(20px, env(safe-area-inset-bottom, 20px));
  scrollbar-width:none;-ms-overflow-style:none;
  background:linear-gradient(to top,rgba(5,5,5,0.95) 0%,rgba(5,5,5,0.7) 60%,transparent 100%);
}
#bottom-strip::-webkit-scrollbar{display:none}

.loc-card {
  min-width:160px;max-width:160px;
  height:82px;
  background:rgba(10,12,8,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.07);
  padding:11px 13px;
  cursor:pointer;
  transition:transform .2s ease,box-shadow .2s ease;
  position:relative;flex-shrink:0;
  display:flex;flex-direction:column;justify-content:space-between;
  overflow:hidden;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
.loc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px}
.loc-card.ok::before{background:var(--jade);box-shadow:2px 0 8px rgba(34,197,94,.4)}
.loc-card.warn::before{background:var(--amber-warn);box-shadow:2px 0 8px rgba(245,158,11,.4)}
.loc-card.critical::before{background:var(--red-crit);box-shadow:2px 0 8px rgba(220,38,38,.4)}
.loc-card:active{transform:scale(0.97)}
.loc-card.selected{border-color:rgba(212,168,67,0.5)!important;box-shadow:0 0 20px rgba(212,168,67,.15)}
.loc-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.loc-card-name{font-size:11px;font-weight:600;color:var(--sand);line-height:1.2}
.status-badge{font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;border-radius:100px}
.status-badge.ok{color:var(--jade);background:rgba(34,197,94,.12)}
.status-badge.warn{color:var(--amber-warn);background:rgba(245,158,11,.12)}
.status-badge.critical{color:var(--red-crit);background:rgba(220,38,38,.12);animation:badge-blink 1.5s ease-in-out infinite}
@keyframes badge-blink{0%,100%{opacity:1}50%{opacity:.5}}
.loc-card-sales{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--sand);letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.loc-card-sub{font-size:9px;color:var(--dust);margin-top:1px}

/* ── SIDE PANEL ──────────────────────────────────── */
#side-panel {
  position:fixed;right:0;top:0;bottom:0;
  width:min(380px, 100vw);
  z-index:200;
  background:rgba(8,10,6,0.97);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-left:1px solid rgba(212,168,67,0.15);
  transform:translateX(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(212,168,67,.2) transparent;
  -webkit-overflow-scrolling:touch;
}
#side-panel::-webkit-scrollbar{width:4px}
#side-panel::-webkit-scrollbar-track{background:transparent}
#side-panel::-webkit-scrollbar-thumb{background:rgba(212,168,67,.2);border-radius:2px}
#side-panel.open{transform:translateX(0)}

/* On mobile: panel full width, slides up from bottom */
@media(max-width:600px){
  #side-panel{
    top:auto;left:0;right:0;bottom:0;
    width:100%;
    max-height:80vh;
    border-left:none;border-top:1px solid rgba(212,168,67,0.2);
    border-radius:20px 20px 0 0;
    transform:translateY(100%);
  }
  #side-panel.open{transform:translateY(0)}
}

.panel-hero{position:relative;height:200px;overflow:hidden;flex-shrink:0}
.panel-hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.7)}
.panel-hero-fallback{width:100%;height:100%;background:linear-gradient(135deg,var(--lift),var(--float));display:flex;align-items:center;justify-content:center;font-size:48px}
.panel-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(8,10,6,.95) 100%)}
.panel-hero-name{position:absolute;bottom:14px;left:20px;font-size:24px;font-weight:700;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8);letter-spacing:-.02em}
.panel-hero-status{position:absolute;bottom:20px;right:20px}
.panel-close{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:16px;z-index:10;transition:all .2s;touch-action:manipulation}
.panel-close:hover{background:rgba(220,38,38,.4);color:#fff}

/* Mobile drag handle */
.panel-handle{display:none;width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 0}
@media(max-width:600px){.panel-handle{display:block}}

.panel-content{padding:18px 18px max(18px,env(safe-area-inset-bottom,18px))}
.panel-section{margin-bottom:22px}
.panel-section-title{font-size:8px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.2em;margin-bottom:10px}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-box{background:var(--lift);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px;transition:border-color .2s}
.metric-box:hover{border-color:rgba(212,168,67,.2)}
.metric-box-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--sand);font-variant-numeric:tabular-nums;letter-spacing:-.03em;line-height:1;margin-bottom:4px}
.metric-box-label{font-size:8px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:.12em}
.metric-box-val.ok{color:var(--jade)}.metric-box-val.warn{color:var(--amber-warn)}.metric-box-val.critical{color:var(--red-crit)}

.daypart-bars{display:flex;gap:10px}
.daypart-bar-wrap{flex:1}
.daypart-bar-label{font-size:8px;color:var(--dust);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.daypart-bar-amount{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--sand);margin-bottom:1px}
.daypart-bar-covers{font-size:8px;color:var(--dust);margin-bottom:5px}
.daypart-track{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.daypart-fill{height:100%;width:0%;border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1) .2s}
.daypart-fill.lunch{background:linear-gradient(to right,var(--gold),var(--gold-hot))}
.daypart-fill.dinner{background:linear-gradient(to right,var(--amber-warn),#fbbf24)}

.mix-row{margin-bottom:8px}
.mix-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mix-row-label{font-size:9px;color:var(--dust);text-transform:uppercase;letter-spacing:.1em}
.mix-row-pct{font-family:'Space Mono',monospace;font-size:11px;color:var(--sand)}
.mix-track{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.mix-fill{height:100%;width:0%;border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1) .3s}
.mix-fill.dine-in{background:var(--jade)}.mix-fill.takeout{background:var(--gold)}.mix-fill.delivery{background:var(--ember)}

.flag-list{display:flex;flex-direction:column;gap:6px}
.flag-pill{padding:7px 11px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid var(--dust);font-size:11px;color:var(--sand);line-height:1.4}
.flag-pill.critical{border-left-color:var(--red-crit);background:rgba(220,38,38,.06)}
.flag-pill.warn{border-left-color:var(--amber-warn);background:rgba(245,158,11,.06)}
.flag-empty{font-size:11px;color:var(--dust);font-style:italic}

/* ── MAP ORBS ─────────────────────────────────────── */
.orb-container{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.orb-sales-label{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;white-space:nowrap;margin-bottom:2px;font-variant-numeric:tabular-nums}
.orb-wrapper{position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.orb-ring-outer{position:absolute;width:44px;height:44px;border-radius:50%;animation:orb-pulse-slow 4s ease-in-out infinite}
.orb-ring-mid{position:absolute;width:26px;height:26px;border-radius:50%;animation:orb-pulse-mid 3s ease-in-out infinite}
.orb-ring-crit2{position:absolute;width:54px;height:54px;border-radius:50%;animation:orb-pulse-slow 2.5s ease-in-out infinite;animation-delay:-1.25s}
.orb-dot{width:10px;height:10px;border-radius:50%;position:relative;z-index:2;box-shadow:0 0 8px currentColor,0 0 16px currentColor}
.orb-name-label{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:500;color:var(--sand);letter-spacing:.05em;white-space:nowrap;margin-top:2px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.orb-crit-indicator{font-size:10px;position:absolute;top:-4px;right:-4px;z-index:3}
@keyframes orb-pulse-slow{0%,100%{transform:scale(1);opacity:.15}50%{transform:scale(1.4);opacity:.05}}
@keyframes orb-pulse-mid{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.2);opacity:.1}}
@keyframes float-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes panel-slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-animate{animation:panel-slide-in .4s ease both}

/* ── OVERLAY BACKDROP (mobile panel) ─────────────── */
#backdrop{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s}
#backdrop.visible{opacity:1;pointer-events:auto}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:768px){
  #left-panel{display:none}
  /* bottom strip: taller safe area padding */
  #bottom-strip{padding-bottom:max(24px,env(safe-area-inset-bottom,24px))}
}
@media(max-width:480px){
  /* Top bar: only show logo + total sales + live dot on very small screens */
  .kpi-item.hide-xs{display:none}
  #top-bar{gap:8px;padding:7px 12px}
  .kpi-val{font-size:12px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <svg class="loading-logo" width="160" height="44" viewBox="0 0 160 44" fill="none">
    <text x="0" y="34" font-family="Space Grotesk,sans-serif" font-size="30" font-weight="700" fill="white" letter-spacing="-1">Rreal</text>
    <text x="78" y="34" font-family="Space Grotesk,sans-serif" font-size="30" font-weight="300" fill="#D4A843" letter-spacing="-1">Tacos</text>
  </svg>
  <div class="loading-spinner"></div>
  <div class="loading-text">Initializing operations feed...</div>
</div>

<div id="bg-gradient"></div>
<canvas id="bg-canvas"></canvas>
<div id="map"></div>
<div id="backdrop" onclick="closePanel()"></div>

<!-- Top bar -->
<div id="top-bar">
  <div class="top-bar-logo">
    <svg width="82" height="22" viewBox="0 0 82 22" fill="none">
      <text x="0" y="16" font-family="Space Grotesk,sans-serif" font-size="15" font-weight="700" fill="white" letter-spacing="-.5">Rreal</text>
      <text x="38" y="16" font-family="Space Grotesk,sans-serif" font-size="15" font-weight="300" fill="#D4A843" letter-spacing="-.5">Tacos</text>
    </svg>
  </div>
  <div class="top-bar-sep"></div>
  <div class="top-bar-kpis">
    <div class="kpi-item">
      <div class="kpi-val" id="tb-sales">—</div>
      <div class="kpi-label">Total Sales</div>
    </div>
    <div class="kpi-item hide-xs">
      <div class="kpi-val" id="tb-covers">—</div>
      <div class="kpi-label">Covers</div>
    </div>
    <div class="kpi-item hide-xs">
      <div class="kpi-val" id="tb-rating">—</div>
      <div class="kpi-label">Rating</div>
    </div>
    <div class="kpi-item hide-xs">
      <div class="kpi-val" id="tb-tip">—</div>
      <div class="kpi-label">Tip Rate</div>
    </div>
  </div>
  <div class="top-bar-sep"></div>
  <div class="live-dot"></div>
  <button class="refresh-btn" id="refresh-btn" onclick="triggerRefresh()" title="Refresh">
    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.5 2A5 5 0 1 0 11 6.5"/><polyline points="8,0 10.5,2 8.5,4.5"/>
    </svg>
  </button>
</div>

<!-- Left vitals (desktop) -->
<div id="left-panel">
  <div class="panel-header">Company Vitals</div>
  <div class="panel-divider"></div>
  <div class="vital-row">
    <div class="vital-label">Net Sales</div>
    <div class="vital-val" id="vit-sales">—</div>
    <div class="vital-bar-track"><div class="vital-bar-fill" id="vit-sales-bar"></div></div>
  </div>
  <div class="vital-row">
    <div class="vital-label">Covers</div>
    <div class="vital-val" id="vit-covers">—</div>
    <div class="vital-bar-track"><div class="vital-bar-fill jade" id="vit-covers-bar"></div></div>
  </div>
  <div class="vital-row">
    <div class="vital-label">Avg / Guest</div>
    <div class="vital-val" id="vit-avg">—</div>
    <div class="vital-bar-track"><div class="vital-bar-fill" id="vit-avg-bar"></div></div>
  </div>
  <div class="vital-row">
    <div class="vital-label">Locations Live</div>
    <div class="vital-val" id="vit-locs">—</div>
    <div class="vital-bar-track"><div class="vital-bar-fill ember" id="vit-locs-bar"></div></div>
  </div>
  <div class="vital-row">
    <div class="vital-label">Alerts</div>
    <div class="vital-val" id="vit-alerts">—</div>
    <div class="vital-bar-track"><div class="vital-bar-fill" id="vit-alerts-bar" style="background:linear-gradient(to right,#DC2626,#ef4444)"></div></div>
  </div>
</div>

<!-- Bottom cards -->
<div id="bottom-strip"></div>

<!-- Side / bottom panel -->
<div id="side-panel">
  <div class="panel-handle"></div>
  <div class="panel-hero" id="panel-hero">
    <div class="panel-hero-fallback" id="panel-hero-fallback">🌮</div>
    <img id="panel-hero-img" class="panel-hero-img" src="" alt="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
      onerror="this.style.display='none';document.getElementById('panel-hero-fallback').style.display='flex'"/>
    <div class="panel-hero-overlay"></div>
    <div class="panel-hero-name" id="panel-loc-name">—</div>
    <div class="panel-hero-status" id="panel-loc-status"></div>
    <div class="panel-close" onclick="closePanel()">✕</div>
  </div>
  <div class="panel-content" id="panel-body"></div>
</div>

<script>
const COORDS = {
  'Midtown':       [33.7823,-84.3838],
  'West Midtown':  [33.7756,-84.4134],
  'Chamblee':      [33.8876,-84.3044],
  'Sandy Springs': [33.9303,-84.3697],
  'Cumming':       [34.2073,-84.1400],
  'Sugar Hill':    [34.1154,-84.0538],
  'Buckhead':      [33.8437,-84.3677],
  'Decatur':       [33.7748,-84.2963],
  'Lawrenceville': [33.9562,-83.9880],
  'Beltline':      [33.7490,-84.3880],
  'Duluth':        [34.0021,-84.1449],
  'Woodstock':     [34.1015,-84.5194],
};

const PHOTOS = {
  'Midtown':'/location-photos/midtown.jpg',
  'West Midtown':'/location-photos/west_midtown.jpg',
  'Chamblee':'/location-photos/chamblee.jpg',
  'Sandy Springs':'/location-photos/sandy_springs.jpg',
  'Cumming':'/location-photos/cumming.jpg',
  'Sugar Hill':'/location-photos/sugar_hill.jpg',
  'Buckhead':'/location-photos/buckhead.jpg',
  'Decatur':'/location-photos/decatur.jpg',
  'Lawrenceville':'/location-photos/lawrenceville.jpg',
  'Beltline':'/location-photos/beltline.jpg',
  'Duluth':'/location-photos/duluth_official.webp',
  'Woodstock':'/location-photos/woodstock.jpg',
};

const fmt$  = n => n==null?'—':'$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtPct= n => n==null?'—':Number(n).toFixed(1)+'%';
const fmtNum= n => n==null?'—':Number(n).toLocaleString('en-US');

function getHealth(loc){
  const l=loc.labor?.laborPct;const f=loc.flags||[];
  if(l>30||f.some(x=>/incident|injury|fire|safety/i.test(x)))return'critical';
  if(l>22||f.length>2)return'warn';
  return'ok';
}
function flagClass(f){
  if(/incident|injury|hair|fire|safety|critical|blood|hurt|mirror/i.test(f))return'critical';
  if(/labor|comp|void|sick|broken|lemon|missing|delay/i.test(f))return'warn';
  return'info';
}
function healthColor(h){return h==='critical'?'#DC2626':h==='warn'?'#F59E0B':'#22C55E'}

function animateCount(el,target,prefix='$',dur=900){
  if(!el||target==null||isNaN(target)){if(el)el.textContent='—';return}
  const t0=performance.now();
  const tick=now=>{
    const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
    el.textContent=prefix+Math.round(target*e).toLocaleString();
    if(p<1)requestAnimationFrame(tick);
  };requestAnimationFrame(tick);
}
function animatePct(el,target,dur=900){
  if(!el||target==null||isNaN(target)){if(el)el.textContent='—';return}
  const t0=performance.now();
  const tick=now=>{
    const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
    el.textContent=(target*e).toFixed(1)+'%';
    if(p<1)requestAnimationFrame(tick);
  };requestAnimationFrame(tick);
}

let dashData=null,selectedLoc=null,mapMarkers={},leafletMap=null;

// Particles
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
const particles=[];
class Particle{constructor(){this.reset()}reset(){this.x=Math.random()*innerWidth;this.y=Math.random()*innerHeight;this.size=Math.random()*2+1;this.sx=(Math.random()-.5)*.3;this.sy=(Math.random()-.5)*.3;this.op=Math.random()*.04+.01;this.col=Math.random()>.6?'#D4A843':'#EDE8DF'}}
function initParticles(){canvas.width=innerWidth;canvas.height=innerHeight;for(let i=0;i<30;i++)particles.push(new Particle())}
function renderParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.sx;p.y+=p.sy;if(p.x<0||p.x>innerWidth||p.y<0||p.y>innerHeight)p.reset();ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.col;ctx.globalAlpha=p.op;ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(renderParticles)}
window.addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight});

// Map
function initMap(){
  leafletMap=L.map('map',{center:[33.92,-84.25],zoom:window.innerWidth<600?10:10,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(leafletMap);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  setTimeout(()=>{document.querySelectorAll('.leaflet-control-zoom a').forEach(b=>{b.style.cssText='background:rgba(10,12,8,.85);backdrop-filter:blur(16px);border:1px solid rgba(212,168,67,.2);color:#EDE8DF'})},100);
}

function createOrbIcon(loc,health,sales){
  const c=healthColor(health),isCrit=health==='critical';
  const s=sales!=null?'$'+Number(sales).toLocaleString('en-US',{maximumFractionDigits:0}):'—';
  return L.divIcon({html:`
    <div class="orb-container">
      <div class="orb-sales-label" style="color:${c};text-shadow:0 0 8px ${c}66">${s}</div>
      <div class="orb-wrapper">
        ${isCrit?`<div class="orb-ring-crit2" style="background:radial-gradient(circle,${c}26,transparent 70%)"></div>`:''}
        <div class="orb-ring-outer" style="background:radial-gradient(circle,${c}26,transparent 70%)"></div>
        <div class="orb-ring-mid" style="background:radial-gradient(circle,${c}4D,transparent 70%)"></div>
        <div class="orb-dot" style="background:${c};color:${c}">${isCrit?'<div class="orb-crit-indicator">◉</div>':''}</div>
      </div>
      <div class="orb-name-label">${loc.name||''}</div>
    </div>`,className:'',iconSize:[80,68],iconAnchor:[40,34]});
}

function refreshPins(){
  if(!dashData||!leafletMap)return;
  Object.values(mapMarkers).forEach(m=>leafletMap.removeLayer(m));mapMarkers={};
  (dashData.toast?.locations||[]).forEach(loc=>{
    const coords=COORDS[loc.name];if(!coords)return;
    const health=getHealth(loc),sales=loc.sales?.netSales??loc.netSales??null;
    const m=L.marker(coords,{icon:createOrbIcon(loc,health,sales),zIndexOffset:health==='critical'?1000:0});
    m.on('click',()=>openPanel(loc));m.addTo(leafletMap);mapMarkers[loc.name]=m;
  });
}

function renderCards(){
  if(!dashData)return;
  const strip=document.getElementById('bottom-strip');strip.innerHTML='';
  (dashData.toast?.locations||[]).forEach((loc,i)=>{
    const h=getHealth(loc),sales=loc.sales?.netSales??loc.netSales??null,covers=loc.sales?.covers??loc.covers??null;
    const card=document.createElement('div');
    card.className=`loc-card ${h}${selectedLoc?.name===loc.name?' selected':''}`;
    card.innerHTML=`
      <div class="loc-card-top">
        <div class="loc-card-name">${loc.name}</div>
        <div class="status-badge ${h}">${h==='ok'?'OK':h==='warn'?'WARN':'CRIT'}</div>
      </div>
      <div>
        <div class="loc-card-sales">${fmt$(sales)}</div>
        <div class="loc-card-sub">${covers!=null?fmtNum(covers)+' covers':''}</div>
      </div>`;
    card.addEventListener('click',()=>openPanel(loc));
    strip.appendChild(card);
  });
}

function updateTopBar(){
  if(!dashData)return;
  let ts=0,tc=0;
  (dashData.toast?.locations||[]).forEach(l=>{ts+=l.sales?.netSales??l.netSales??0;tc+=l.sales?.covers??l.covers??0});
  animateCount(document.getElementById('tb-sales'),ts,'$',1200);
  animateCount(document.getElementById('tb-covers'),tc,'',1200);
  const r=dashData.ovation?.overallRating??dashData.sunday?.avgRating??null;
  document.getElementById('tb-rating').textContent=r?'★ '+Number(r).toFixed(2):'—';
  const t=dashData.toast?.tipRate??null;
  document.getElementById('tb-tip').textContent=t?fmtPct(t):'—';
}

function updateVitals(){
  if(!dashData)return;
  const locs=dashData.toast?.locations||[];
  let ts=0,tc=0,rep=0,al=0;
  locs.forEach(l=>{const s=l.sales?.netSales??l.netSales??0,c=l.sales?.covers??l.covers??0;ts+=s;tc+=c;if(s>0)rep++;al+=(l.flags||[]).length});
  animateCount(document.getElementById('vit-sales'),ts,'$',1000);
  animateCount(document.getElementById('vit-covers'),tc,'',1000);
  animateCount(document.getElementById('vit-avg'),tc>0?Math.round(ts/tc):0,'$',1000);
  const vl=document.getElementById('vit-locs'),va=document.getElementById('vit-alerts');
  const t0=performance.now();
  (function tick(now){const p=Math.min((now-t0)/1000,1),e=1-Math.pow(1-p,3);vl.textContent=Math.round(rep*e)+'/'+locs.length;va.textContent=Math.round(al*e);if(p<1)requestAnimationFrame(tick)})(t0);
  setTimeout(()=>{
    document.getElementById('vit-sales-bar').style.width='85%';
    document.getElementById('vit-covers-bar').style.width='70%';
    document.getElementById('vit-avg-bar').style.width='60%';
    document.getElementById('vit-locs-bar').style.width=(rep/Math.max(locs.length,1)*100)+'%';
    document.getElementById('vit-alerts-bar').style.width=Math.min(al*10,100)+'%';
  },200);
}

function openPanel(loc){
  selectedLoc=loc;renderCards();
  const panel=document.getElementById('side-panel');
  const bd=document.getElementById('backdrop');
  const heroImg=document.getElementById('panel-hero-img');
  const heroFb=document.getElementById('panel-hero-fallback');
  const photo=PHOTOS[loc.name];
  if(photo){heroImg.src=photo;heroImg.style.display='block';heroFb.style.display='none'}
  else{heroImg.style.display='none';heroFb.style.display='flex'}
  document.getElementById('panel-loc-name').textContent=loc.name;
  const h=getHealth(loc);
  document.getElementById('panel-loc-status').innerHTML=`<span class="status-badge ${h}" style="font-size:9px;padding:4px 10px">${h.toUpperCase()}</span>`;

  const sales=loc.sales?.netSales??loc.netSales??null;
  const covers=loc.sales?.covers??loc.covers??null;
  const avg=(sales&&covers&&covers>0)?sales/covers:null;
  const lp=loc.labor?.laborPct??null;
  const lc=lp>30?'critical':lp>22?'warn':'ok';
  const ls=loc.dayparts?.lunch??loc.lunch??null,ds=loc.dayparts?.dinner??loc.dinner??null;
  const lsa=ls?.sales??null,lco=ls?.covers??null,dsa=ds?.sales??null,dco=ds?.covers??null;
  const mx=Math.max(lsa||0,dsa||0,1);
  const diM=loc.diningMix?.dineIn??loc.dineIn??null,toM=loc.diningMix?.takeout??loc.takeout??null,deM=loc.diningMix?.delivery??loc.delivery??null;
  const flags=loc.flags||[];

  document.getElementById('panel-body').innerHTML=`
    <div class="panel-section panel-animate" style="animation-delay:.05s">
      <div class="panel-section-title">Key Metrics</div>
      <div class="metrics-grid">
        <div class="metric-box"><div class="metric-box-val" id="pm-sales">—</div><div class="metric-box-label">Net Sales</div></div>
        <div class="metric-box"><div class="metric-box-val" id="pm-avg">—</div><div class="metric-box-label">Avg / Guest</div></div>
        <div class="metric-box"><div class="metric-box-val ${lc}" id="pm-labor">—</div><div class="metric-box-label">Labor %</div></div>
        <div class="metric-box"><div class="metric-box-val" id="pm-covers">—</div><div class="metric-box-label">Covers</div></div>
      </div>
    </div>
    <div class="panel-section panel-animate" style="animation-delay:.1s">
      <div class="panel-section-title">Daypart</div>
      <div class="daypart-bars">
        <div class="daypart-bar-wrap">
          <div class="daypart-bar-label">Lunch</div>
          <div class="daypart-bar-amount">${fmt$(lsa)}</div>
          <div class="daypart-bar-covers">${lco!=null?fmtNum(lco)+' covers':''}</div>
          <div class="daypart-track"><div class="daypart-fill lunch" id="dp-lunch"></div></div>
        </div>
        <div class="daypart-bar-wrap">
          <div class="daypart-bar-label">Dinner</div>
          <div class="daypart-bar-amount">${fmt$(dsa)}</div>
          <div class="daypart-bar-covers">${dco!=null?fmtNum(dco)+' covers':''}</div>
          <div class="daypart-track"><div class="daypart-fill dinner" id="dp-dinner"></div></div>
        </div>
      </div>
    </div>
    <div class="panel-section panel-animate" style="animation-delay:.15s">
      <div class="panel-section-title">Dining Mix</div>
      <div class="mix-row"><div class="mix-row-top"><div class="mix-row-label">Dine-In</div><div class="mix-row-pct">${diM!=null?fmtPct(diM):'—'}</div></div><div class="mix-track"><div class="mix-fill dine-in" id="mix-di"></div></div></div>
      <div class="mix-row"><div class="mix-row-top"><div class="mix-row-label">Takeout</div><div class="mix-row-pct">${toM!=null?fmtPct(toM):'—'}</div></div><div class="mix-track"><div class="mix-fill takeout" id="mix-to"></div></div></div>
      <div class="mix-row"><div class="mix-row-top"><div class="mix-row-label">Delivery</div><div class="mix-row-pct">${deM!=null?fmtPct(deM):'—'}</div></div><div class="mix-track"><div class="mix-fill delivery" id="mix-de"></div></div></div>
    </div>
    <div class="panel-section panel-animate" style="animation-delay:.2s">
      <div class="panel-section-title">Flags</div>
      ${flags.length>0?`<div class="flag-list">${flags.map(f=>`<div class="flag-pill ${flagClass(f)}">${f}</div>`).join('')}</div>`:'<div class="flag-empty">No flags — all clear.</div>'}
    </div>`;

  panel.classList.add('open');bd.classList.add('visible');

  // Scroll panel to top on mobile
  panel.scrollTop=0;

  setTimeout(()=>{
    if(sales!=null)animateCount(document.getElementById('pm-sales'),sales,'$',800);
    if(avg!=null)animateCount(document.getElementById('pm-avg'),Math.round(avg),'$',700);
    if(lp!=null)animatePct(document.getElementById('pm-labor'),lp,700);
    if(covers!=null)animateCount(document.getElementById('pm-covers'),covers,'',800);
    setTimeout(()=>{
      const dl=document.getElementById('dp-lunch'),dd=document.getElementById('dp-dinner');
      if(dl)dl.style.width=(lsa?(lsa/mx*100):0)+'%';
      if(dd)dd.style.width=(dsa?(dsa/mx*100):0)+'%';
      const mdi=document.getElementById('mix-di'),mto=document.getElementById('mix-to'),mde=document.getElementById('mix-de');
      if(mdi)mdi.style.width=(diM||0)+'%';if(mto)mto.style.width=(toM||0)+'%';if(mde)mde.style.width=(Math.max(deM||0,0))+'%';
    },200);
  },100);
}

function closePanel(){
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('backdrop').classList.remove('visible');
  selectedLoc=null;renderCards();
}

// Touch swipe to close panel on mobile
let touchStartY=0;
document.getElementById('side-panel').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.getElementById('side-panel').addEventListener('touchmove',e=>{
  const panel=document.getElementById('side-panel');
  if(panel.scrollTop===0&&e.touches[0].clientY-touchStartY>60)closePanel();
},{passive:true});

async function loadData(){
  try{const r=await fetch('/api/dashboard/all');if(!r.ok)throw 0;dashData=await r.json()}
  catch{dashData=getDemoData()}
  updateTopBar();updateVitals();renderCards();refreshPins();
}

function triggerRefresh(){
  const b=document.getElementById('refresh-btn');b.classList.add('spinning');
  loadData().finally(()=>setTimeout(()=>b.classList.remove('spinning'),600));
}

function getDemoData(){
  const names=Object.keys(COORDS);
  return{toast:{locations:names.map((name,i)=>{
    const s=8000+Math.random()*14000,c=Math.round(s/(12+Math.random()*6)),lp=16+Math.random()*18;
    const ls=s*(.4+Math.random()*.2),ds=s-ls;
    const di=50+Math.random()*20,to=20+Math.random()*15,de=100-di-to;
    const flagSets=[[],[],['Labor over target','Late delivery'],['Void spike'],['Incident: minor injury','Labor over threshold'],[],['Broken equipment'],[],[],[],[],[]];
    return{name,sales:{netSales:Math.round(s),covers:c},labor:{laborPct:Math.round(lp*10)/10},flags:flagSets[i%flagSets.length],
      dayparts:{lunch:{sales:Math.round(ls),covers:Math.round(c*.45)},dinner:{sales:Math.round(ds),covers:Math.round(c*.55)}},
      diningMix:{dineIn:Math.round(di*10)/10,takeout:Math.round(to*10)/10,delivery:Math.round(Math.max(de,0)*10)/10}};
  }),tipRate:19.4},ovation:{overallRating:4.71}};
}

document.addEventListener('DOMContentLoaded',()=>{
  initParticles();renderParticles();initMap();
  const loading=document.getElementById('loading');
  const fail=setTimeout(()=>{loading.classList.add('fade-out');setTimeout(()=>loading.style.display='none',600)},12000);
  loadData().then(()=>{clearTimeout(fail);setTimeout(()=>{loading.classList.add('fade-out');setTimeout(()=>loading.style.display='none',600)},500)});
  setInterval(loadData,5*60*1000);
});
</script>
