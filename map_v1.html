<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rreal Tacos — Operations Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --surface-base:  #0A0A0A;
    --surface-1:     #111410;
    --surface-2:     #181C14;
    --surface-3:     #1F2418;
    --brand-red:     #E8342A;
    --brand-gold:    #D4A843;
    --brand-gold-dim:#8B6F2C;
    --status-ok:     #22C55E;
    --status-warn:   #F59E0B;
    --status-alert:  #DC2626;
    --text-primary:  #F0EDE8;
    --text-secondary:#8A8A7A;
    --text-tertiary: #4A4A3A;
    --border-subtle: rgba(255,255,255,0.06);
    --border-default:rgba(255,255,255,0.10);
  }

  html, body {
    height: 100%;
    background: var(--surface-base);
    color: var(--text-primary);
    font-family: 'Fira Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Loading Overlay ── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.5s ease;
  }
  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #loading-logo {
    width: 180px;
    animation: goldGlow 2s ease-in-out infinite;
  }
  #loading-text {
    font-family: 'Fira Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ── Top Bar ── */
  #topbar {
    height: 52px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  #topbar-logo {
    height: 28px;
    flex-shrink: 0;
  }
  #kpi-strip {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .kpi-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    border-right: 1px solid var(--border-subtle);
  }
  .kpi-item:last-child { border-right: none; }
  .kpi-value {
    font-family: 'Fira Code', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }
  .kpi-value.gold { color: var(--brand-gold); }
  .kpi-value.alert { color: var(--status-alert); }
  .kpi-label {
    font-family: 'Fira Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    margin-top: 3px;
  }
  #topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #date-select {
    background: var(--surface-2);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    font-family: 'Fira Sans', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
  }
  #date-select option { background: var(--surface-2); }
  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--status-ok);
    animation: livePulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .live-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--status-ok);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #refresh-btn {
    background: transparent;
    border: 1px solid var(--brand-gold-dim);
    color: var(--brand-gold);
    font-family: 'Fira Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
  }
  #refresh-btn:hover {
    background: rgba(212,168,67,0.1);
    border-color: var(--brand-gold);
  }

  /* ── Main Layout ── */
  #main {
    display: flex;
    height: calc(100vh - 52px);
    overflow: hidden;
  }

  /* ── Map Panel ── */
  #map-panel {
    flex: 0 0 58%;
    position: relative;
  }
  #map {
    width: 100%;
    height: 100%;
  }

  /* ── Scorecard Panel ── */
  #scorecard-panel {
    flex: 0 0 42%;
    background: var(--surface-1);
    border-left: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sort-bar {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 6px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--surface-2);
    flex-shrink: 0;
  }
  .sort-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-tertiary);
    margin-right: 4px;
  }
  .sort-btn {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    font-family: 'Fira Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover, .sort-btn.active {
    background: rgba(212,168,67,0.12);
    border-color: var(--brand-gold-dim);
    color: var(--brand-gold);
  }
  #scorecard-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #scorecard-list::-webkit-scrollbar { width: 4px; }
  #scorecard-list::-webkit-scrollbar-track { background: transparent; }
  #scorecard-list::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

  .scorecard {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface-2);
    border-radius: 6px;
    border-left: 4px solid var(--status-ok);
    margin-bottom: 6px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
    position: relative;
  }
  .scorecard:hover { transform: translateX(3px); background: var(--surface-3); }
  .scorecard.warn { border-left-color: var(--status-warn); }
  .scorecard.alert { border-left-color: var(--status-alert); animation: alertPulse 2s ease-in-out infinite; }

  .rank-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface-3);
    border: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .rank-circle.gold {
    background: rgba(212,168,67,0.15);
    border-color: var(--brand-gold-dim);
    color: var(--brand-gold);
  }
  .scorecard-info { flex: 1; min-width: 0; }
  .scorecard-name {
    font-family: 'Playfair Display SC', serif;
    font-size: 13px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scorecard-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .status-badge {
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 5px;
    border-radius: 2px;
    line-height: 1;
  }
  .badge-ok   { background: rgba(34,197,94,0.15);  color: var(--status-ok); }
  .badge-warn { background: rgba(245,158,11,0.15); color: var(--status-warn); }
  .badge-alert{ background: rgba(220,38,38,0.15);  color: var(--status-alert); }
  .scorecard-meta {
    font-size: 10px;
    color: var(--text-secondary);
    font-family: 'Fira Code', monospace;
  }
  .scorecard-sales {
    font-family: 'Fira Code', monospace;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    text-align: right;
    flex-shrink: 0;
  }
  .scorecard-covers {
    font-size: 10px;
    color: var(--text-secondary);
    font-family: 'Fira Code', monospace;
    text-align: right;
    margin-top: 1px;
  }

  /* ── Slide Panel ── */
  #slide-panel {
    position: fixed;
    top: 52px;
    right: -400px;
    width: 380px;
    height: calc(100vh - 52px);
    background: var(--surface-1);
    border-left: 1px solid var(--border-subtle);
    z-index: 500;
    overflow-y: auto;
    transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  #slide-panel.open { right: 0; animation: fadeSlide 0.3s ease; }
  #slide-panel::-webkit-scrollbar { width: 4px; }
  #slide-panel::-webkit-scrollbar-track { background: transparent; }
  #slide-panel::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

  /* Zone 1 — Hero Photo */
  .panel-hero {
    position: relative;
    height: 220px;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--surface-3);
  }
  .panel-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .panel-hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
  }
  .panel-hero-name {
    position: absolute;
    bottom: 14px;
    left: 16px;
    font-family: 'Playfair Display SC', serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .panel-hero-badge {
    position: absolute;
    bottom: 14px;
    right: 14px;
  }
  .panel-close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.15s;
  }
  .panel-close-btn:hover { background: rgba(0,0,0,0.85); }

  /* Panel Content */
  .panel-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  /* Zone 2 — Metrics Grid */
  .panel-section-title {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--brand-gold-dim);
    margin-bottom: 8px;
  }
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
  }
  .metric-cell {
    background: var(--surface-2);
    padding: 12px 14px;
  }
  .metric-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--brand-gold-dim);
    margin-bottom: 4px;
  }
  .metric-value {
    font-family: 'Fira Code', monospace;
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1;
  }
  .metric-value.ok    { color: var(--status-ok); }
  .metric-value.warn  { color: var(--status-warn); }
  .metric-value.alert { color: var(--status-alert); }

  /* Zone 3 — Daypart */
  .daypart-row {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
  }
  .daypart-col { flex: 1; }
  .daypart-period {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .daypart-sales {
    font-family: 'Fira Code', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .daypart-covers {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .daypart-bar-track {
    display: flex;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    background: var(--surface-3);
    gap: 1px;
  }
  .daypart-bar-lunch {
    background: var(--brand-gold);
    border-radius: 3px 0 0 3px;
    transition: width 0.5s ease;
  }
  .daypart-bar-dinner {
    background: #B97D2A;
    flex: 1;
    border-radius: 0 3px 3px 0;
  }

  /* Zone 4 — Dining Mix */
  .mix-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mix-item-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .mix-name {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
  }
  .mix-pct {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .mix-bar-track {
    height: 5px;
    background: var(--surface-3);
    border-radius: 3px;
    overflow: hidden;
  }
  .mix-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .mix-bar-dinein   { background: var(--brand-gold); }
  .mix-bar-takeout  { background: #B97D2A; }
  .mix-bar-delivery { background: #C0392B; }

  /* Zone 5 — Flags */
  .flags-list { display: flex; flex-direction: column; gap: 6px; }
  .flag-item {
    padding: 8px 12px;
    border-radius: 4px;
    border-left: 3px solid var(--status-alert);
    background: rgba(220,38,38,0.08);
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .flag-item.warn {
    border-left-color: var(--status-warn);
    background: rgba(245,158,11,0.08);
  }
  .flag-item.info {
    border-left-color: var(--border-default);
    background: var(--surface-2);
  }
  .no-flags {
    font-size: 11px;
    color: var(--text-tertiary);
    font-style: italic;
    text-align: center;
    padding: 8px 0;
  }

  /* Divider */
  .panel-divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 0 -16px;
  }

  /* ── Map Custom Styles ── */
  .leaflet-container { background: #0A0A0A; }
  .pin-label {
    background: none !important;
    border: none !important;
    box-shadow: none !important;
  }
  .pin-label-inner {
    font-family: 'Fira Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    white-space: nowrap;
    margin-top: 3px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    letter-spacing: 0.04em;
  }

  /* ── Animations ── */
  @keyframes alertPulse {
    0%,100%{ box-shadow: 0 0 0 0 rgba(220,38,38,0.7); }
    50%    { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
  }
  @keyframes goldGlow {
    0%,100%{ opacity: 0.8; }
    50%    { opacity: 1; box-shadow: 0 0 20px rgba(212,168,67,0.5); }
  }
  @keyframes livePulse {
    0%,100%{ opacity: 1; transform: scale(1); }
    50%    { opacity: 0.5; transform: scale(1.3); }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pinPulse {
    0%,100%{ opacity: 0.7; r: 2; }
    50%    { opacity: 0;   r: 14; }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    #main { flex-direction: column; }
    #map-panel  { flex: 0 0 45vh; }
    #scorecard-panel { flex: 1; }
    .kpi-item { padding: 0 10px; }
    .kpi-value { font-size: 14px; }
    #slide-panel { width: 100vw; right: -100vw; }
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <img id="loading-logo" src="https://cdn.prod.website-files.com/6942ec7702201d9a4c1626b4/6945814389a8d77af25137bb_Logo%20white.svg" alt="Rreal Tacos">
  <div id="loading-text">Loading command center...</div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <img id="topbar-logo"
       src="https://cdn.prod.website-files.com/6942ec7702201d9a4c1626b4/6945814389a8d77af25137bb_Logo%20white.svg"
       alt="Rreal Tacos">

  <div id="kpi-strip">
    <div class="kpi-item">
      <div class="kpi-value gold" id="kpi-sales">—</div>
      <div class="kpi-label">Total Sales</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-value" id="kpi-covers">—</div>
      <div class="kpi-label">Covers</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-value gold" id="kpi-rating">—</div>
      <div class="kpi-label">★ Rating</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-value" id="kpi-tip">—</div>
      <div class="kpi-label">Tip Rate</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-value alert" id="kpi-unresolved">—</div>
      <div class="kpi-label">Unresolved</div>
    </div>
  </div>

  <div id="topbar-right">
    <select id="date-select">
      <option value="today">Today</option>
    </select>
    <div class="live-dot"></div>
    <span class="live-label">Live</span>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<!-- Main Content -->
<div id="main">
  <div id="map-panel">
    <div id="map"></div>
  </div>
  <div id="scorecard-panel">
    <div id="sort-bar">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" onclick="setSortMode('sales',this)">Sales</button>
      <button class="sort-btn" onclick="setSortMode('rating',this)">Rating</button>
      <button class="sort-btn" onclick="setSortMode('labor',this)">Labor</button>
      <button class="sort-btn" onclick="setSortMode('flags',this)">Flags</button>
    </div>
    <div id="scorecard-list"></div>
  </div>
</div>

<!-- Slide Panel -->
<div id="slide-panel">
  <div id="slide-panel-content"></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const LOCATION_COORDS = {
  'Midtown':       [33.7823, -84.3838],
  'West Midtown':  [33.7756, -84.4134],
  'Chamblee':      [33.8876, -84.3044],
  'Sandy Springs': [33.9303, -84.3697],
  'Cumming':       [34.2073, -84.1400],
  'Sugar Hill':    [34.1154, -84.0538],
  'Buckhead':      [33.8437, -84.3677],
  'Decatur':       [33.7748, -84.2963],
  'Lawrenceville': [33.9562, -83.9880],
  'Beltline':      [33.7490, -84.3880],
  'Duluth':        [34.0021, -84.1449],
  'Woodstock':     [34.1015, -84.5194],
};

const LOCATION_PHOTOS = {
  'Midtown':       '/location-photos/midtown.jpg',
  'West Midtown':  '/location-photos/west_midtown.jpg',
  'Chamblee':      '/location-photos/chamblee.jpg',
  'Sandy Springs': '/location-photos/sandy_springs.jpg',
  'Cumming':       '/location-photos/cumming.jpg',
  'Sugar Hill':    '/location-photos/sugar_hill.jpg',
  'Buckhead':      '/location-photos/buckhead.jpg',
  'Decatur':       '/location-photos/decatur.jpg',
  'Lawrenceville': '/location-photos/lawrenceville.jpg',
  'Beltline':      '/location-photos/beltline.jpg',
  'Duluth':        '/location-photos/duluth_official.webp',
  'Woodstock':     '/location-photos/woodstock.jpg',
};

// ── Formatters ─────────────────────────────────────────────────────────────
const fmt$ = n => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
const fmtPct = n => n == null ? '—' : Number(n).toFixed(1) + '%';
const fmtNum = n => n == null ? '—' : Number(n).toLocaleString('en-US');

// ── State ──────────────────────────────────────────────────────────────────
let appData = null;
let locationItems = []; // processed location objects
let sortMode = 'sales';
let map = null;
let markers = {}; // name → leaflet marker
let activePanelName = null;

// ── Map Init ───────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: [33.9, -84.2],
    zoom: 10,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd'
  }).addTo(map);

  // Subtle attribution
  L.control.attribution({ prefix: false }).addTo(map);
}

// ── Health Calculation ─────────────────────────────────────────────────────
function getHealth(laborPct, compPct) {
  if (laborPct != null && laborPct > 30) return 'alert';
  if ((laborPct != null && laborPct > 22) || (compPct != null && compPct > 7)) return 'warn';
  return 'ok';
}

function healthColor(h) {
  if (h === 'alert') return '#DC2626';
  if (h === 'warn')  return '#F59E0B';
  return '#22C55E';
}

function healthBgColor(h) {
  if (h === 'alert') return 'rgba(220,38,38,0.15)';
  if (h === 'warn')  return 'rgba(245,158,11,0.15)';
  return 'rgba(34,197,94,0.15)';
}

// ── SVG Teardrop Pin ───────────────────────────────────────────────────────
function makePinSVG(sales, health, radius) {
  const r = Math.max(18, Math.min(40, radius));
  const w = r * 2;
  const h = r * 2 + r * 0.7;  // height = diameter + tail
  const cx = r;
  const cy = r;
  const tailH = r * 0.7;

  const color = healthColor(health);
  const fill  = healthBgColor(health);

  // Sales text inside pin
  const salesNum = sales != null ? fmt$(sales) : '—';
  // For small pins, shorten
  const displayText = sales != null && sales >= 10000
    ? '$' + Math.round(sales / 1000) + 'k'
    : salesNum;
  const fontSize = r < 24 ? 8 : r < 32 ? 9 : 10;

  const pulse = health === 'alert'
    ? `<circle cx="${cx}" cy="${cy}" r="${r + 2}" fill="none" stroke="${color}" stroke-width="2" opacity="0.6">
         <animate attributeName="r" values="${r};${r+10};${r}" dur="2s" repeatCount="indefinite"/>
         <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
       </circle>`
    : '';

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${pulse}
    <path d="M${cx},${h} Q${cx - r * 0.3},${cy + r * 0.9} ${cx - r},${cy}
             A${r},${r} 0 1 1 ${cx + r},${cy}
             Q${cx + r * 0.3},${cy + r * 0.9} ${cx},${h}Z"
          fill="${fill}" stroke="${color}" stroke-width="1.5"/>
    <text x="${cx}" y="${cy + fontSize * 0.38}"
          text-anchor="middle" dominant-baseline="middle"
          font-family="Fira Code, monospace" font-size="${fontSize}"
          font-weight="700" fill="${color}">${displayText}</text>
  </svg>`;

  return svg;
}

// ── Build Map Pins ─────────────────────────────────────────────────────────
function buildPins(items) {
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const maxSales = Math.max(...items.map(i => i.sales || 0));
  const minSales = Math.min(...items.map(i => i.sales || 0));

  items.forEach(item => {
    const coords = LOCATION_COORDS[item.name];
    if (!coords) return;

    // Sales-based radius (18–40)
    const salesRange = maxSales - minSales || 1;
    const radius = 18 + ((item.sales - minSales) / salesRange) * 22;

    const svgStr = makePinSVG(item.sales, item.health, radius);
    const pinW = Math.max(36, Math.min(80, radius * 2));
    const pinH = pinW + pinW * 0.35;

    const icon = L.divIcon({
      html: svgStr,
      iconSize: [pinW, pinH],
      iconAnchor: [pinW / 2, pinH],
      className: ''
    });

    const marker = L.marker(coords, { icon }).addTo(map);

    // Name label below pin
    const labelIcon = L.divIcon({
      html: `<div class="pin-label-inner">${item.name}</div>`,
      iconSize: [120, 16],
      iconAnchor: [60, -4],
      className: 'pin-label'
    });
    L.marker(coords, { icon: labelIcon, interactive: false }).addTo(map);

    marker.on('click', () => openPanel(item.name));
    markers[item.name] = marker;
  });
}

// ── Build Scorecards ───────────────────────────────────────────────────────
function buildScorecards(items) {
  const sorted = [...items].sort((a, b) => {
    if (sortMode === 'sales')  return (b.sales || 0) - (a.sales || 0);
    if (sortMode === 'rating') return (b.rating || 0) - (a.rating || 0);
    if (sortMode === 'labor')  return (b.laborPct || 0) - (a.laborPct || 0);
    if (sortMode === 'flags')  return (b.flags.length) - (a.flags.length);
    return 0;
  });

  const list = document.getElementById('scorecard-list');
  list.innerHTML = '';

  sorted.forEach((item, idx) => {
    const rank = idx + 1;
    const isTop3 = rank <= 3;
    const card = document.createElement('div');
    card.className = `scorecard ${item.health}`;
    card.onclick = () => openPanel(item.name);

    const badgeClass = `badge-${item.health}`;
    const healthLabel = item.health === 'alert' ? 'Alert' : item.health === 'warn' ? 'Watch' : 'Good';

    const flagCount = item.flags.length;
    const flagText = flagCount > 0 ? `<span style="font-size:9px;color:var(--status-alert);margin-left:4px;">▲ ${flagCount} flag${flagCount > 1 ? 's' : ''}</span>` : '';
    const tipText = item.tipRate != null ? `<span class="scorecard-meta">${fmtPct(item.tipRate)} tip</span>` : '';

    card.innerHTML = `
      <div class="rank-circle ${isTop3 ? 'gold' : ''}">${rank}</div>
      <div class="scorecard-info">
        <div class="scorecard-name">${item.name}</div>
        <div class="scorecard-sub">
          <span class="status-badge ${badgeClass}">${healthLabel}</span>
          ${tipText}
          ${flagText}
        </div>
      </div>
      <div>
        <div class="scorecard-sales">${fmt$(item.sales)}</div>
        <div class="scorecard-covers">${fmtNum(item.covers)} cvrs</div>
      </div>
    `;

    list.appendChild(card);
  });
}

// ── Open Slide Panel ───────────────────────────────────────────────────────
function openPanel(name) {
  activePanelName = name;
  const item = locationItems.find(i => i.name === name);
  if (!item) return;

  const content = document.getElementById('slide-panel-content');
  const photoUrl = LOCATION_PHOTOS[name] || '';
  const health = item.health;
  const badgeClass = `badge-${health}`;
  const healthLabel = health === 'alert' ? '● Alert' : health === 'warn' ? '● Watch' : '● Good';

  // Labor color
  const laborClass = item.laborPct == null ? '' : item.laborPct > 30 ? 'alert' : item.laborPct > 22 ? 'warn' : 'ok';

  // Daypart
  const lunch  = item.daypart?.lunch  || {};
  const dinner = item.daypart?.dinner || {};
  const totalDaypartSales = (lunch.sales || 0) + (dinner.sales || 0);
  const lunchPct  = totalDaypartSales > 0 ? (lunch.sales  / totalDaypartSales * 100) : 50;
  const dinnerPct = 100 - lunchPct;

  // Dining mix
  const dm = item.diningMix || {};
  const dineInPct   = dm.dineInPct   || 0;
  const takeoutPct  = dm.takeoutPct  || 0;
  const deliveryPct = dm.deliveryPct || 0;

  // Flags
  const flagsHtml = item.flags.length > 0
    ? item.flags.map(f => `<div class="flag-item">${f}</div>`).join('')
    : '<div class="no-flags">No active flags</div>';

  // Rating
  const ratingDisplay = item.rating != null ? `★ ${item.rating.toFixed(1)}` : '—';

  content.innerHTML = `
    <!-- Zone 1: Hero -->
    <div class="panel-hero">
      <img src="${photoUrl}" alt="${name}" onerror="this.style.display='none'">
      <div class="panel-hero-gradient"></div>
      <div class="panel-hero-name">${name}</div>
      <div class="panel-hero-badge">
        <span class="status-badge ${badgeClass}" style="font-size:10px;padding:4px 8px;">${healthLabel}</span>
      </div>
      <button class="panel-close-btn" onclick="closePanel()">✕</button>
    </div>

    <div class="panel-body">

      <!-- Zone 2: Key Metrics -->
      <div>
        <div class="panel-section-title">Key Metrics</div>
        <div class="metrics-grid">
          <div class="metric-cell">
            <div class="metric-label">Net Sales</div>
            <div class="metric-value">${fmt$(item.sales)}</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Avg / Guest</div>
            <div class="metric-value">$${item.avgPerGuest != null ? Number(item.avgPerGuest).toFixed(2) : '—'}</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Labor %</div>
            <div class="metric-value ${laborClass}">${fmtPct(item.laborPct)}</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Covers</div>
            <div class="metric-value">${fmtNum(item.covers)}</div>
          </div>
        </div>
      </div>

      <div class="panel-divider"></div>

      <!-- Zone 3: Daypart -->
      <div>
        <div class="panel-section-title">Daypart Breakdown</div>
        <div class="daypart-row">
          <div class="daypart-col">
            <div class="daypart-period" style="color:var(--brand-gold)">Lunch</div>
            <div class="daypart-sales">${fmt$(lunch.sales)}</div>
            <div class="daypart-covers">${fmtNum(lunch.covers)} covers</div>
          </div>
          <div class="daypart-col">
            <div class="daypart-period" style="color:#B97D2A">Dinner</div>
            <div class="daypart-sales">${fmt$(dinner.sales)}</div>
            <div class="daypart-covers">${fmtNum(dinner.covers)} covers</div>
          </div>
        </div>
        <div class="daypart-bar-track">
          <div class="daypart-bar-lunch" style="width:${lunchPct}%"></div>
          <div class="daypart-bar-dinner"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <span style="font-size:9px;color:var(--brand-gold-dim)">Lunch ${lunchPct.toFixed(0)}%</span>
          <span style="font-size:9px;color:var(--brand-gold-dim)">Dinner ${dinnerPct.toFixed(0)}%</span>
        </div>
      </div>

      <div class="panel-divider"></div>

      <!-- Zone 4: Dining Mix -->
      <div>
        <div class="panel-section-title">Dining Mix</div>
        <div class="mix-row">
          <div>
            <div class="mix-item-label">
              <span class="mix-name">Dine-In</span>
              <span class="mix-pct">${fmtPct(dineInPct)}</span>
            </div>
            <div class="mix-bar-track">
              <div class="mix-bar-fill mix-bar-dinein" style="width:${dineInPct}%"></div>
            </div>
          </div>
          <div>
            <div class="mix-item-label">
              <span class="mix-name">Takeout</span>
              <span class="mix-pct">${fmtPct(takeoutPct)}</span>
            </div>
            <div class="mix-bar-track">
              <div class="mix-bar-fill mix-bar-takeout" style="width:${takeoutPct}%"></div>
            </div>
          </div>
          <div>
            <div class="mix-item-label">
              <span class="mix-name">Delivery</span>
              <span class="mix-pct">${fmtPct(deliveryPct)}</span>
            </div>
            <div class="mix-bar-track">
              <div class="mix-bar-fill mix-bar-delivery" style="width:${deliveryPct}%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-divider"></div>

      <!-- Zone 5: Flags -->
      <div>
        <div class="panel-section-title">Operational Flags</div>
        <div class="flags-list">${flagsHtml}</div>
      </div>

      <!-- Google Rating if available -->
      ${item.rating != null ? `
      <div class="panel-divider"></div>
      <div>
        <div class="panel-section-title">Google Rating</div>
        <div style="font-family:'Fira Code',monospace;font-size:20px;font-weight:700;color:var(--brand-gold)">
          ${ratingDisplay}
        </div>
      </div>` : ''}

    </div>
  `;

  document.getElementById('slide-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('slide-panel').classList.remove('open');
  activePanelName = null;
}

// ── Sort Controls ──────────────────────────────────────────────────────────
function setSortMode(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildScorecards(locationItems);
}

// ── Process API Data ───────────────────────────────────────────────────────
function processData(data, laborMap = {}) {
  const toast = data.toast || {};
  const locationMap = data.locationMap || {};
  const ovation = data.ovation || {};
  const flagsArray = data.flags || [];

  // Build ovation rating map (name → google rating)
  const ovationRatings = {};
  const ovationLocs = ovation.locations || [];
  ovationLocs.forEach(loc => {
    const name = (loc.friendlyName || '').trim() || loc.name || '';
    // Match to known location names
    const subs = loc.subscriptions || [];
    let googleRating = null;
    subs.forEach(sub => {
      const rv = sub.reviewSubscription || {};
      if (rv.network === 'google' && rv.globalRating) {
        googleRating = rv.globalRating;
      }
    });
    if (googleRating) ovationRatings[name] = googleRating;
  });

  // Build flags map per location
  const flagsMap = {};
  flagsArray.forEach(f => {
    const loc = f.location;
    if (!flagsMap[loc]) flagsMap[loc] = [];
    flagsMap[loc].push(f.flag);
  });

  // Process each location
  const items = [];
  const locations = toast.locations || [];

  locations.forEach(loc => {
    const name = loc.name;
    const m = loc.metrics || {};
    const lm = locationMap[name] || {};
    const labor = loc.labor || {};
    const sunday = (lm.sunday) || {};

    // Labor % — from P&L data if available
    const laborPct = laborMap[name] != null ? laborMap[name] : null;

    const compPct = m.comps ? m.comps.pct : null;
    const health = getHealth(laborPct, compPct);

    // Tip rate from Sunday data
    const tipRate = sunday.tipRate != null ? sunday.tipRate : (m.paymentMix ? m.paymentMix.avgTipPct : null);

    // Google rating — match by name variants
    let rating = ovationRatings[name] || ovationRatings[name + ' '] || null;
    // Try partial match
    if (!rating) {
      Object.keys(ovationRatings).forEach(key => {
        if (key.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(key.toLowerCase())) {
          rating = ovationRatings[key];
        }
      });
    }

    items.push({
      name,
      sales:      m.netSales,
      covers:     m.coverCount,
      avgPerGuest:m.avgPerGuest,
      laborPct,
      compPct,
      health,
      tipRate,
      rating,
      daypart:    m.daypart || {},
      diningMix:  m.diningMix || {},
      flags:      flagsMap[name] || [],
    });
  });

  return { items, companySummary: toast.companySummary || {}, ovation };
}

// ── Update KPI Strip ───────────────────────────────────────────────────────
function updateKPIs(summary, ovation, items) {
  document.getElementById('kpi-sales').textContent = fmt$(summary.totalNetSales);
  document.getElementById('kpi-covers').textContent = fmtNum(summary.totalCovers);
  document.getElementById('kpi-rating').textContent =
    ovation.avgRating != null ? ovation.avgRating.toFixed(2) : '—';
  document.getElementById('kpi-unresolved').textContent =
    ovation.unresolvedCount != null ? fmtNum(ovation.unresolvedCount) : '—';

  // Tip rate: average across locations with data
  const tips = items.filter(i => i.tipRate != null).map(i => i.tipRate);
  const avgTip = tips.length > 0 ? tips.reduce((a,b) => a+b, 0) / tips.length : null;
  document.getElementById('kpi-tip').textContent = fmtPct(avgTip);
}

// ── Update Date Selector ───────────────────────────────────────────────────
function updateDateSelector(data) {
  const businessDate = data.toast?.date || 'Today';
  const select = document.getElementById('date-select');
  select.innerHTML = `<option value="today">${businessDate}</option>`;
}

// ── Load Data ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [res, pnlRes] = await Promise.all([
      fetch('/api/dashboard/all'),
      fetch('/api/pnl').catch(() => null)
    ]);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    appData = data;

    // Extract labor % from most recent P&L week
    let laborMap = {};
    if (pnlRes && pnlRes.ok) {
      try {
        const pnlData = await pnlRes.json();
        const weeks = pnlData.data || [];
        // Find the week with the most labor data
        let bestWeek = null, bestCount = 0;
        weeks.forEach(w => {
          const count = Object.values(w.locations || {}).filter(l => l.laborPct != null).length;
          if (count > bestCount) { bestCount = count; bestWeek = w; }
        });
        if (bestWeek) {
          Object.entries(bestWeek.locations || {}).forEach(([name, loc]) => {
            if (loc.laborPct != null) laborMap[name] = loc.laborPct;
          });
        }
      } catch(e) { console.warn('P&L parse error', e); }
    }

    const { items, companySummary, ovation } = processData(data, laborMap);
    locationItems = items;

    updateDateSelector(data);
    updateKPIs(companySummary, ovation, items);
    buildPins(items);
    buildScorecards(items);

    // Re-open panel if it was open
    if (activePanelName) openPanel(activePanelName);

  } catch (err) {
    console.error('Failed to load data:', err);
  } finally {
    // Hide loading overlay
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 600);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  // Failsafe: hide loading after 12s no matter what
  setTimeout(() => {
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 600);
  }, 12000);

  initMap();
  await loadData();
})();

// Close panel on map click
document.getElementById('map').addEventListener('click', (e) => {
  if (e.target.closest('#map') && !e.target.closest('.leaflet-marker-icon')) {
    closePanel();
  }
});
</script>
