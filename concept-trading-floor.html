<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rreal Tacos — Trading Floor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --brand-red:#e33239;--brand-blue:#1e93da;--brand-dark:#1a2429;--brand-navy:#0f1923;
    --green:#22c55e;--yellow:#eab308;--text:#f0f0f8;--ticker-bg:#0a0a0f;
  }
  body{background:var(--brand-navy);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* TICKER ROW */
  #tickerRow{
    height:56px;background:var(--ticker-bg);border-bottom:2px solid #1e93da22;
    overflow:hidden;position:relative;flex-shrink:0;
  }
  #tickerTrack{
    display:flex;align-items:center;height:100%;white-space:nowrap;
    animation:tickerScroll 60s linear infinite;
    will-change:transform;
  }
  #tickerTrack:hover{animation-play-state:paused}
  @keyframes tickerScroll{0%{transform:translateX(0%)}100%{transform:translateX(-50%)}}
  .ticker-item{
    display:inline-flex;align-items:center;gap:8px;padding:0 20px;height:100%;
    font-size:13px;font-weight:600;letter-spacing:.3px;
  }
  .ticker-dot{font-size:8px}
  .ticker-sep{width:1px;height:30px;background:#2a3540;margin:0 4px;flex-shrink:0}
  .t-green{color:#22c55e}
  .t-red{color:#e33239}
  .t-yellow{color:#eab308}
  .ticker-label{
    position:absolute;left:0;top:0;bottom:0;width:120px;
    background:linear-gradient(90deg,var(--ticker-bg) 70%,transparent);
    display:flex;align-items:center;padding-left:14px;z-index:2;
    font-size:11px;font-weight:700;color:var(--brand-blue);letter-spacing:1px;text-transform:uppercase;
  }

  /* TOPBAR (date + logo above KPI bar) */
  #topbar2{
    display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;
    background:#111820;border-bottom:1px solid #2a3540;flex-shrink:0;
  }
  #topbar2 img{height:24px}
  .tb-sep{width:1px;height:28px;background:#2a3540}
  #dateSelect{background:#1e2d36;border:1px solid #3a4a56;color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
  #dateBadge2{font-size:11px;color:#6a7a8a}
  #staleWarn2{color:#f59e0b;font-size:11px;font-weight:600;display:none}
  #refreshBtn{background:var(--brand-red);border:none;color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;margin-left:auto}

  /* KPI BAR */
  #kpiBar{
    display:flex;height:90px;background:#111820;border-bottom:2px solid #2a3540;flex-shrink:0;
  }
  .kpi-card{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-right:1px solid #2a3540;padding:8px;position:relative;
  }
  .kpi-card:last-child{border-right:none}
  .kpi-v{font-size:26px;font-weight:800;color:var(--brand-blue);letter-spacing:-1px}
  .kpi-l{font-size:10px;color:#6a7a8a;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
  .kpi-trend{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700}
  .trend-up{color:#22c55e}
  .trend-dn{color:#e33239}

  /* MAIN 3-COLUMN */
  #mainRow{flex:1;display:flex;overflow:hidden;min-height:0}

  /* LEFT: Company Scorecard */
  #leftCol{
    width:35%;border-right:1px solid #2a3540;display:flex;flex-direction:column;
    padding:16px;overflow-y:auto;background:var(--brand-dark);gap:16px;
  }
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#6a7a8a;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2a3540}
  .big-num{font-size:42px;font-weight:800;color:var(--brand-blue);letter-spacing:-2px;line-height:1}
  .big-lbl{font-size:12px;color:#6a7a8a;margin-top:4px}
  .bar-row{margin-bottom:10px}
  .bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-track{height:8px;background:#1e2d36;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
  .left-controls{display:flex;gap:8px;flex-wrap:wrap}
  .ctrl-pill{padding:4px 10px;border-radius:20px;border:1px solid #3a4a56;background:transparent;color:var(--text);font-size:11px;cursor:pointer}
  .ctrl-pill.active{background:var(--brand-blue);border-color:var(--brand-blue)}

  /* CENTER: Sparklines */
  #centerCol{
    width:40%;border-right:1px solid #2a3540;display:flex;flex-direction:column;
    padding:16px;overflow:hidden;background:var(--brand-navy);
  }
  #sparkCanvas{flex:1;width:100%;min-height:0}
  #sparkLegend{
    display:flex;flex-wrap:wrap;gap:4px 12px;padding-top:8px;
    max-height:120px;overflow-y:auto;border-top:1px solid #2a3540;
  }
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .legend-val{color:#6a7a8a}
  #sparkTooltip{
    position:absolute;background:#1e2d36;border:1px solid #3a4a56;padding:6px 10px;
    border-radius:6px;font-size:12px;pointer-events:none;display:none;z-index:10;
  }

  /* RIGHT: Alerts */
  #rightCol{
    flex:1;display:flex;flex-direction:column;padding:16px;overflow:hidden;background:var(--brand-dark);
  }
  #alertFeed{flex:1;overflow-y:auto;margin-bottom:12px}
  .alert-item{
    display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #2a3540;
    font-size:12px;
  }
  .alert-badge{
    flex-shrink:0;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;
    background:#3d2f00;color:#eab308;border:1px solid #854d0e;
  }
  .alert-badge.critical{background:#4c1010;color:#ef4444;border-color:#991b1b}
  .conv-card{
    background:#1e2d36;border-radius:8px;padding:10px;margin-bottom:6px;font-size:12px;
    border-left:3px solid var(--brand-blue);
  }
  .conv-name{font-weight:700;color:var(--text)}
  .conv-loc{font-size:10px;color:#6a7a8a}
  .conv-msg{color:#b0c0d0;margin-top:4px;font-size:11px}
  .conv-time{font-size:10px;color:#6a7a8a;margin-top:4px}
  .star-rating{color:#eab308}
  .unresolved-count{
    font-size:28px;font-weight:800;color:var(--brand-red);text-align:center;
    padding:10px 0 6px;
  }
  .unresolved-lbl{font-size:11px;color:#6a7a8a;text-align:center;margin-bottom:10px;text-transform:uppercase}

  /* LOADING */
  #loading{
    position:fixed;inset:0;background:var(--brand-navy);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:9999;gap:16px;
  }
  #loading img{height:60px;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

  #errorBanner{position:fixed;top:0;left:0;right:0;background:#4c1010;color:#ef4444;padding:10px 20px;text-align:center;z-index:5000;display:none;font-weight:600}

  /* scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1a2429}
  ::-webkit-scrollbar-thumb{background:#3a4a56;border-radius:3px}
</style>
</head>
<body>

<div id="loading">
  <img src="https://cdn.prod.website-files.com/6942ec7702201d9a4c1626b4/6945814389a8d77af25137bb_Logo%20white.svg" alt="Rreal Tacos">
  <p>Loading trading floor…</p>
</div>

<div id="errorBanner"></div>

<!-- TICKER -->
<div id="tickerRow">
  <div class="ticker-label">RREAL LIVE</div>
  <div id="tickerTrack"></div>
</div>

<!-- TOPBAR -->
<div id="topbar2">
  <img src="https://cdn.prod.website-files.com/6942ec7702201d9a4c1626b4/6945814389a8d77af25137bb_Logo%20white.svg" alt="Rreal Tacos">
  <div class="tb-sep"></div>
  <select id="dateSelect" title="Select date"></select>
  <span id="dateBadge2"></span>
  <span id="staleWarn2">⚠ Stale Data</span>
  <button id="refreshBtn">⟳ Refresh</button>
</div>

<!-- KPI BAR -->
<div id="kpiBar">
  <div class="kpi-card">
    <div class="kpi-v" id="kTotSales" data-target="0">—</div>
    <div class="kpi-l">Total Sales</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-v" id="kCovers" data-target="0">—</div>
    <div class="kpi-l">Covers</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-v" id="kAvgGuest" data-target="0">—</div>
    <div class="kpi-l">Avg / Guest</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-v" id="kRating">—</div>
    <div class="kpi-l">Sunday ★ Rating</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-v" id="kTipRate">—</div>
    <div class="kpi-l">Tip Rate</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-v" id="kUnresolved" style="color:var(--brand-red)">—</div>
    <div class="kpi-l">Unresolved</div>
  </div>
</div>

<!-- MAIN 3 COLUMNS -->
<div id="mainRow">
  <div id="leftCol">
    <div>
      <div class="section-title">Company Performance</div>
      <div class="big-num" id="bigSales">—</div>
      <div class="big-lbl">NET SALES TODAY</div>
    </div>
    <div>
      <div class="section-title">Revenue Mix</div>
      <div id="revBars"></div>
    </div>
    <div>
      <div class="section-title">Payment Mix</div>
      <div id="payBars"></div>
    </div>
    <div>
      <div class="section-title">Locations Reporting</div>
      <div id="locReporting" style="font-size:28px;font-weight:700;color:var(--green)">—</div>
    </div>
  </div>

  <div id="centerCol" style="position:relative">
    <div class="section-title">LIVE SPARKLINES — All Locations</div>
    <canvas id="sparkCanvas"></canvas>
    <div id="sparkLegend"></div>
    <div id="sparkTooltip"></div>
  </div>

  <div id="rightCol">
    <div class="section-title">🚨 ACTIVE FLAGS</div>
    <div id="alertFeed"></div>
    <div class="section-title">OVATION ALERTS</div>
    <div class="unresolved-count" id="unresolvedNum">—</div>
    <div class="unresolved-lbl">Unresolved Conversations</div>
    <div id="convCards"></div>
  </div>
</div>

<script>
const fmt$ = n => n==null ? '—' : '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtN = (n,d=1) => n==null ? '—' : Number(n).toFixed(d);
const fmtPct = n => n==null ? '—' : Number(n).toFixed(1)+'%';
const fmtStar = n => n==null ? '—' : '★ '+Number(n).toFixed(2);
function timeAgo(d){if(!d)return'';const s=(Date.now()-new Date(d))/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function matchUberStore(stores, locName) {
  return stores?.find(s => s.name.replace(/^Rreal Tacos\s*/i,'').trim().toLowerCase() === locName.toLowerCase());
}

// Location colors for sparklines
const LOC_COLORS = [
  '#1e93da','#22c55e','#e33239','#eab308','#a78bfa','#fb923c',
  '#34d399','#f472b6','#60a5fa','#fbbf24','#4ade80','#f87171'
];

let DATA = {};
let reports = [];
let currentDate = null;
let sparkData = null;

async function loadAll(date) {
  try {
    const [dash, uber, tips, pnl, rpts] = await Promise.all([
      fetch(date ? `/api/dashboard/all?date=${date}` : '/api/dashboard/all').then(r=>r.json()),
      fetch('/api/ubereats').then(r=>r.json()),
      fetch('/api/tipouts').then(r=>r.json()),
      fetch('/api/pnl').then(r=>r.json()),
      fetch('/api/reports/list').then(r=>r.json()),
    ]);
    DATA = { dash, uber, tips, pnl, rpts };
    reports = rpts.reports || [];
    currentDate = date || dash.toast?.businessDate;

    const generatedAt = dash.toast?.generatedAt;
    const staleEl = document.getElementById('staleWarn2');
    if (generatedAt) {
      const gt = new Date(generatedAt);
      if (!isNaN(gt) && (Date.now() - gt) > 86400000) staleEl.style.display='inline';
      else staleEl.style.display='none';
    }

    populateDateDropdown();
    renderTicker();
    renderKPIs();
    renderLeft();
    await buildSparkData();
    renderSparklines();
    renderAlerts();
    document.getElementById('loading').style.display='none';
  } catch(e) {
    document.getElementById('loading').style.display='none';
    showError('Failed to load data: ' + e.message);
  }
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display='none', 5000);
}

function populateDateDropdown() {
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = '';
  for (const r of reports) {
    const opt = document.createElement('option');
    opt.value = r.date;
    opt.textContent = r.label;
    if (r.date === currentDate) opt.selected = true;
    sel.appendChild(opt);
  }
  const cur = reports.find(r=>r.date===currentDate);
  document.getElementById('dateBadge2').textContent = cur ? cur.label.replace(/^⚠\s*/,'') : '';
}

function renderTicker() {
  const locs = DATA.dash?.toast?.locations || [];
  const sunLocs = DATA.dash?.sunday?.locations || [];

  let html = '';
  for (const loc of locs) {
    const sunLoc = sunLocs.find(s=>s.name===loc.name);
    const sales = loc.metrics?.netSales || 0;
    const sdly = loc.sdlyMetrics?.netSales;
    let wowPct = null;
    let cls = 't-yellow';
    let arrow = '▶';
    if (sdly && sdly > 0) {
      wowPct = ((sales - sdly) / sdly) * 100;
      if (wowPct > 1) { cls = 't-green'; arrow = '▲'; }
      else if (wowPct < -1) { cls = 't-red'; arrow = '▼'; }
    }
    const rating = sunLoc?.avgRating ? fmtStar(sunLoc.avgRating) : '';
    const pctStr = wowPct != null ? `${arrow}${Math.abs(wowPct).toFixed(1)}%` : '';
    const covers = loc.metrics?.coverCount ? `${Number(loc.metrics.coverCount).toLocaleString()} cov` : '';

    html += `<div class="ticker-item ${cls}">
      <span class="ticker-dot">●</span>
      <span>${loc.name.toUpperCase()}</span>
      <span>${fmt$(sales)}</span>
      ${pctStr ? `<span>${pctStr}</span>` : ''}
      ${covers ? `<span style="color:#8a9aaa">| ${covers}</span>` : ''}
      ${rating ? `<span style="color:#eab308">| ${rating}</span>` : ''}
    </div>
    <div class="ticker-sep"></div>`;
  }
  // Double for seamless loop
  const track = document.getElementById('tickerTrack');
  track.innerHTML = html + html;
}

function animateCountUp(el, target, prefix='', suffix='', duration=1200) {
  const start = performance.now();
  const startVal = 0;
  function step(ts) {
    const p = Math.min((ts - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const cur = Math.round(startVal + (target - startVal) * ease);
    el.textContent = prefix + cur.toLocaleString() + suffix;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderKPIs() {
  const cs = DATA.dash?.toast?.companySummary;
  const sun = DATA.dash?.sunday?.company;
  const ov = DATA.dash?.ovation;

  if (cs?.totalNetSales) animateCountUp(document.getElementById('kTotSales'), Math.round(cs.totalNetSales), '$');
  if (cs?.totalCovers) animateCountUp(document.getElementById('kCovers'), Math.round(cs.totalCovers));
  if (cs?.avgPerGuest) {
    const el = document.getElementById('kAvgGuest');
    animateCountUp(el, Math.round(cs.avgPerGuest), '$');
  }
  document.getElementById('kRating').textContent = sun ? fmtStar(sun.avgRating) : '—';
  document.getElementById('kTipRate').textContent = sun?.avgTipRate != null ? fmtPct(sun.avgTipRate * 100) : '—';
  if (ov?.unresolvedCount != null) {
    animateCountUp(document.getElementById('kUnresolved'), ov.unresolvedCount);
  }
}

function renderLeft() {
  const cs = DATA.dash?.toast?.companySummary;
  document.getElementById('bigSales').textContent = cs ? fmt$(cs.totalNetSales) : '—';
  document.getElementById('locReporting').textContent = cs?.locationsReporting != null ? `${cs.locationsReporting} / 12` : '—';

  // Revenue mix - aggregate from all locations
  const locs = DATA.dash?.toast?.locations || [];
  let dineIn=0, takeout=0, delivery=0, total=0;
  for (const loc of locs) {
    const dm = loc.metrics?.diningMix;
    if (dm) {
      dineIn += dm.dineInSales || 0;
      takeout += dm.takeoutSales || 0;
      delivery += dm.thirdPartySales || 0;
    }
    total += loc.metrics?.netSales || 0;
  }
  if (total > 0) {
    document.getElementById('revBars').innerHTML = `
      ${barRow('Dine-In', dineIn, total, '#1e93da')}
      ${barRow('Takeout', takeout, total, '#22c55e')}
      ${barRow('Delivery', delivery, total, '#eab308')}`;
  }

  // Payment mix
  let credit=0, cash=0, other=0, ptotal=0;
  for (const loc of locs) {
    const pm = loc.metrics?.paymentMix;
    if (pm) {
      credit += pm.creditSales || 0;
      cash += pm.cashSales || 0;
      other += (pm.otherSales || 0) + (pm.deliverySales || 0);
    }
    ptotal += loc.metrics?.netSales || 0;
  }
  if (ptotal > 0) {
    document.getElementById('payBars').innerHTML = `
      ${barRow('Credit', credit, ptotal, '#a78bfa')}
      ${barRow('Cash', cash, ptotal, '#34d399')}
      ${barRow('Other', other, ptotal, '#fb923c')}`;
  }
}

function barRow(label, val, total, color) {
  const pct = total > 0 ? (val/total*100) : 0;
  return `<div class="bar-row">
    <div class="bar-label"><span>${label}</span><span>${fmtPct(pct)} (${fmt$(val)})</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

async function buildSparkData() {
  // Use available reports to get multi-day data
  const nonPartial = reports.filter(r => !r.partial).slice(0, 8).reverse();
  sparkData = { dates: [], locations: {} };

  const locs = DATA.dash?.toast?.locations || [];
  for (const loc of locs) sparkData.locations[loc.name] = [];

  for (const rpt of nonPartial) {
    sparkData.dates.push(rpt.label);
    try {
      const d = await fetch(`/api/dashboard/all?date=${rpt.date}`).then(r=>r.json());
      for (const loc of (d.toast?.locations || [])) {
        if (sparkData.locations[loc.name] !== undefined) {
          sparkData.locations[loc.name].push(loc.metrics?.netSales || 0);
        }
      }
    } catch(e) {
      for (const name of Object.keys(sparkData.locations)) sparkData.locations[name].push(null);
    }
  }
}

function renderSparklines() {
  if (!sparkData) return;
  const canvas = document.getElementById('sparkCanvas');
  const container = document.getElementById('centerCol');
  const legend = document.getElementById('sparkLegend');

  // Size canvas
  const cr = canvas.parentElement.getBoundingClientRect();
  const legendH = 110;
  const titleH = 30;
  canvas.width = cr.width - 32;
  canvas.height = cr.height - legendH - titleH - 32;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const names = Object.keys(sparkData.locations);
  const allVals = Object.values(sparkData.locations).flat().filter(v=>v!=null && v>0);
  if (allVals.length === 0) return;

  const maxV = Math.max(...allVals);
  const minV = 0;
  const padL = 60, padR = 10, padT = 10, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const nDates = sparkData.dates.length;

  // Grid lines
  ctx.strokeStyle = '#2a3540';
  ctx.lineWidth = 1;
  const gridLines = 4;
  for (let i = 0; i <= gridLines; i++) {
    const y = padT + (chartH * i / gridLines);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    const val = maxV - (maxV * i / gridLines);
    ctx.fillStyle = '#6a7a8a';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('$'+Math.round(val/1000)+'k', padL - 4, y + 4);
  }

  // X axis labels
  if (nDates > 1) {
    for (let i = 0; i < nDates; i++) {
      const x = padL + (i / (nDates - 1)) * chartW;
      ctx.fillStyle = '#6a7a8a';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(sparkData.dates[i], x, H - 4);
    }
  }

  // Lines
  legend.innerHTML = '';
  const currentLoc = DATA.dash?.toast?.locations || [];

  names.forEach((name, idx) => {
    const color = LOC_COLORS[idx % LOC_COLORS.length];
    const vals = sparkData.locations[name];
    if (!vals || vals.length === 0) return;

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    let first = true;
    for (let i = 0; i < vals.length; i++) {
      if (vals[i] == null) { first = true; continue; }
      const x = padL + (nDates > 1 ? (i / (nDates - 1)) * chartW : chartW / 2);
      const y = padT + chartH - ((vals[i] - minV) / (maxV - minV)) * chartH;
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Last data point dot
    const lastVal = [...vals].reverse().find(v=>v!=null);
    if (lastVal != null) {
      const li = vals.lastIndexOf(lastVal);
      const x = padL + (nDates > 1 ? (li / (nDates - 1)) * chartW : chartW/2);
      const y = padT + chartH - ((lastVal - minV) / (maxV - minV)) * chartH;
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
    }

    // Legend
    const curLoc = currentLoc.find(l=>l.name===name);
    const curSales = curLoc?.metrics?.netSales;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${name}</span><span class="legend-val">${fmt$(curSales)}</span>`;
    legend.appendChild(item);
  });

  // Tooltip on hover
  canvas.onmousemove = function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    if (mx < padL || mx > W - padR || my < padT || my > H - padB) {
      document.getElementById('sparkTooltip').style.display = 'none'; return;
    }
    const dateIdx = Math.round((mx - padL) / chartW * (nDates - 1));
    if (dateIdx < 0 || dateIdx >= nDates) { document.getElementById('sparkTooltip').style.display='none'; return; }

    // Find closest location line
    let closest = null, closestDist = Infinity;
    names.forEach((name, idx) => {
      const vals = sparkData.locations[name];
      if (!vals || vals[dateIdx] == null) return;
      const y = padT + chartH - ((vals[dateIdx] - minV) / (maxV - minV)) * chartH;
      const dist = Math.abs(my - y);
      if (dist < closestDist) { closestDist = dist; closest = { name, val: vals[dateIdx], color: LOC_COLORS[idx % LOC_COLORS.length] }; }
    });

    if (closest && closestDist < 30) {
      const tt = document.getElementById('sparkTooltip');
      tt.style.display = 'block';
      tt.style.left = (e.clientX - container.getBoundingClientRect().left + 10) + 'px';
      tt.style.top = (e.clientY - container.getBoundingClientRect().top - 30) + 'px';
      tt.innerHTML = `<span style="color:${closest.color}">●</span> <b>${closest.name}</b><br>${sparkData.dates[dateIdx]}: ${fmt$(closest.val)}`;
    } else {
      document.getElementById('sparkTooltip').style.display='none';
    }
  };
  canvas.onmouseleave = () => document.getElementById('sparkTooltip').style.display='none';
}

function renderAlerts() {
  const flags = DATA.dash?.flags || [];
  const ov = DATA.dash?.ovation;
  const feed = document.getElementById('alertFeed');

  if (flags.length === 0) {
    feed.innerHTML = '<div style="color:#6a7a8a;font-size:12px;padding:8px 0">No active flags 🟢</div>';
  } else {
    feed.innerHTML = flags.map(f => `
      <div class="alert-item">
        <span class="alert-badge">${f.location}</span>
        <span>${f.flag}</span>
      </div>`).join('');
  }

  // Unresolved
  document.getElementById('unresolvedNum').textContent = ov?.unresolvedCount ?? '—';

  // Recent conversations
  const convs = (ov?.conversations || []).slice(0, 3);
  const cards = document.getElementById('convCards');
  if (convs.length === 0) {
    cards.innerHTML = '<div style="color:#6a7a8a;font-size:12px">No recent conversations</div>';
  } else {
    cards.innerHTML = convs.map(c => `
      <div class="conv-card">
        <div class="conv-name">${c.customer?.name || 'Guest'}</div>
        <div class="conv-loc">${c.location?.friendlyName || c.location?.name || ''}</div>
        ${c.lastSurvey?.rating ? `<div class="star-rating">${'★'.repeat(c.lastSurvey.rating)}${'☆'.repeat(5-c.lastSurvey.rating)}</div>` : ''}
        ${c.lastSurvey?.feedback ? `<div class="conv-msg">"${c.lastSurvey.feedback.slice(0,80)}${c.lastSurvey.feedback.length>80?'…':''}"</div>` : ''}
        ${c.lastMessage?.body ? `<div class="conv-msg">${c.lastMessage.body.slice(0,60)}${c.lastMessage.body.length>60?'…':''}</div>` : ''}
        <div class="conv-time">${timeAgo(c.updated || c.lastMessage?.created)} • ${c.resolved ? '✓ resolved' : '⚠ open'}</div>
      </div>`).join('');
  }
}

document.getElementById('dateSelect').addEventListener('change', function() { loadAll(this.value); });
document.getElementById('refreshBtn').addEventListener('click', () => { const d = document.getElementById('dateSelect').value; loadAll(d); });

// Boot
fetch('/api/reports/list').then(r=>r.json()).then(d=>{
  const rpts = d.reports || [];
  const first = rpts.find(r=>!r.partial) || rpts[0];
  loadAll(first?.date || null);
}).catch(()=>loadAll(null));
