<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rreal Tacos — Ops Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    /* Surfaces — warm-tinted OLED blacks */
    --surface-base:    #0A0A0A;
    --surface-1:       #111410;
    --surface-2:       #181C14;
    --surface-3:       #1F2418;
    --surface-glass:   rgba(255,255,255,0.04);

    /* Brand */
    --brand-red:       #E8342A;
    --brand-gold:      #D4A843;
    --brand-gold-dim:  #8B6F2C;

    /* Status */
    --status-ok:       #22C55E;
    --status-ok-bg:    rgba(34,197,94,0.10);
    --status-warn:     #F59E0B;
    --status-warn-bg:  rgba(245,158,11,0.10);
    --status-alert:    #DC2626;
    --status-alert-bg: rgba(220,38,38,0.10);
    --status-live:     #22C55E;

    /* Legacy aliases (keep for JS color refs) */
    --color-brand:         #E8342A;
    --color-accent:        #D4A843;
    --color-accent-muted:  rgba(212,168,67,0.12);
    --color-accent-border: rgba(212,168,67,0.35);
    --color-surface-base:  #0A0A0A;
    --color-surface-1:     #111410;
    --color-surface-2:     #181C14;
    --color-surface-3:     #1F2418;
    --color-success:       #22C55E;
    --color-success-muted: rgba(34,197,94,0.10);
    --color-warning:       #F59E0B;
    --color-warning-muted: rgba(245,158,11,0.10);
    --color-danger:        #DC2626;
    --color-danger-muted:  rgba(220,38,38,0.10);
    --color-neutral:       #8A9A96;
    --color-neutral-muted: #1A2220;

    /* Text */
    --text-primary:    #F0EDE8;
    --text-secondary:  #8A8A7A;
    --text-tertiary:   #4A4A3A;
    --text-accent:     #D4A843;
    --text-inverted:   #0A0A0A;
    --text-gold:       #D4A843;

    /* Borders */
    --border-subtle:   rgba(255,255,255,0.06);
    --border-default:  rgba(255,255,255,0.10);
    --border-strong:   rgba(255,255,255,0.20);

    /* Radius */
    --r-sm:   6px;
    --r-md:   10px;
    --r-lg:   16px;
    --r-full: 9999px;
    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   16px;
    --radius-full: 9999px;

    /* Spacing */
    --sp-1: 4px;  --space-1: 4px;
    --sp-2: 8px;  --space-2: 8px;
    --sp-3: 12px; --space-3: 12px;
    --sp-4: 16px; --space-4: 16px;
    --sp-5: 20px; --space-5: 20px;
    --sp-6: 24px; --space-6: 24px;
    --sp-8: 32px; --space-8: 32px;

    /* Typography */
    --font-sans:      'Fira Sans', 'SF Pro Display', system-ui, sans-serif;
    --font-mono:      'Fira Code', monospace;
    --font-display:   'Playfair Display SC', serif;

    --text-2xs:  9px;
    --text-xs:   11px;
    --text-sm:   13px;
    --text-base: 14px;
    --text-md:   15px;
    --text-lg:   18px;
    --text-xl:   22px;
    --text-2xl:  28px;

    --weight-regular:  400;
    --weight-medium:   500;
    --weight-semibold: 600;
    --weight-bold:     700;
    --weight-black:    800;
  }

  body{
    background: var(--surface-base);
    color: var(--text-primary);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: var(--text-base);
  }

  /* ─── ANIMATIONS ─── */
  @keyframes alertPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.7); }
    50%       { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
  }
  @keyframes goldGlow {
    0%, 100% { opacity: 0.8; }
    50%       { opacity: 1; box-shadow: 0 0 16px rgba(212,168,67,0.5); }
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.3); }
  }
  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  @keyframes pinPulse {
    0%   { transform: scale(0.85); opacity: 0.7; }
    70%  { transform: scale(1.5);  opacity: 0; }
    100% { transform: scale(1.5);  opacity: 0; }
  }
  @keyframes loadPulse {
    0%, 100% { opacity: 0.5; transform: scale(0.97); }
    50%       { opacity: 1;   transform: scale(1); }
  }

  /* ─── TOP BAR ─── */
  #topbar{
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 16px;
    height: 52px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
    z-index: 1000;
    box-shadow: 0 1px 0 var(--border-subtle);
  }
  .logo-area{
    display: flex;
    align-items: center;
    padding-right: 16px;
    height: 100%;
    border-right: 1px solid var(--border-subtle);
  }
  #topbar img{ height: 26px; }
  .tb-sep{
    width: 1px;
    height: 28px;
    background: var(--border-subtle);
    margin: 0 12px;
    flex-shrink: 0;
  }
  #dateSelect{
    background: var(--surface-2);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    padding: 5px 10px;
    border-radius: var(--r-md);
    font-size: var(--text-xs);
    font-family: var(--font-sans);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  #dateSelect:hover, #dateSelect:focus { border-color: var(--brand-gold); }
  #dateBadge{
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    white-space: nowrap;
    margin-left: 8px;
  }

  /* ─── KPI STRIP ─── */
  .kpi-strip{
    display: flex;
    gap: 0;
    flex: 1;
    justify-content: center;
    align-items: stretch;
    height: 100%;
  }
  .kpi{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2px;
    padding: 0 20px;
    border-right: 1px solid var(--border-subtle);
    min-width: 100px;
  }
  .kpi:last-child { border-right: none; }
  .kpi-val{
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .kpi-lbl{
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Gold refresh button + live indicator */
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    margin-left: 12px;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--status-live);
    animation: livePulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .live-label {
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--status-live);
  }
  #staleWarn{
    color: var(--status-warn);
    font-size: var(--text-xs);
    font-weight: 600;
    display: none;
    white-space: nowrap;
  }
  #refreshBtn{
    background: transparent;
    border: 1px solid var(--brand-gold);
    color: var(--brand-gold);
    padding: 5px 14px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-size: var(--text-xs);
    font-weight: 600;
    font-family: var(--font-sans);
    letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #refreshBtn:hover{
    background: var(--brand-gold);
    color: var(--text-inverted);
  }

  /* ─── SPLIT LAYOUT ─── */
  #splitLayout { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  /* ─── MAP SIDE ─── */
  #mapSide { width: 55%; position: relative; border-right: 1px solid var(--border-default); }
  #mapEl { width: 100%; height: 100%; }

  /* ─── SLIDE PANEL ─── */
  #slidePanel{
    position: absolute;
    right: -380px;
    top: 0;
    bottom: 0;
    width: 360px;
    background: rgba(17,20,16,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(212,168,67,0.15);
    overflow-y: auto;
    z-index: 2000;
    transition: right 0.25s ease;
    box-shadow: -8px 0 40px rgba(0,0,0,0.6);
  }
  #slidePanel.open { right: 0; }

  /* Panel zone 1 — sticky header */
  .panel-header{
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border-subtle);
    background: rgba(17,20,16,0.98);
    position: sticky;
    top: 0;
    z-index: 10;
    border-top: 2px solid rgba(212,168,67,0.3);
  }
  .panel-header-top{
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .panel-name{
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
    flex: 1;
  }
  #panelClose,
  .panel-close-btn{
    background: transparent;
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    border-radius: var(--r-md);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #panelClose:hover, #panelClose:active,
  .panel-close-btn:hover, .panel-close-btn:active{
    background: rgba(220,38,38,0.15);
    color: #ff4444;
    border-color: rgba(220,38,38,0.5);
  }

  /* Status badges — dot + text pill */
  .status-badge{
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 7px;
    border-radius: var(--r-full);
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid transparent;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-healthy{
    background: var(--status-ok-bg);
    color: var(--status-ok);
    border-color: rgba(34,197,94,0.25);
  }
  .badge-healthy .status-dot { background: var(--status-ok); box-shadow: 0 0 4px var(--status-ok); }
  .badge-warning{
    background: var(--status-warn-bg);
    color: var(--status-warn);
    border-color: rgba(245,158,11,0.25);
  }
  .badge-warning .status-dot { background: var(--status-warn); }
  .badge-critical{
    background: var(--status-alert-bg);
    color: var(--status-alert);
    border-color: rgba(220,38,38,0.25);
  }
  .badge-critical .status-dot {
    background: var(--status-alert);
    animation: alertPulse 1.5s infinite;
  }

  /* Panel zone 2 — hero KPI grid */
  .panel-hero-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
  }
  .panel-hero-kpi{
    background: var(--surface-2);
    padding: 14px 16px;
  }
  .panel-hero-kpi .value{
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .panel-hero-kpi .label{
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--brand-gold);
    margin-top: 5px;
  }

  /* Panel sections */
  .panel-section-header{
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--brand-gold);
    padding: 12px 16px 6px;
    border-top: 1px solid var(--border-subtle);
  }
  .panel-section-content { padding: 4px 16px 14px; }
  .panel-stat-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .panel-stat-item{
    background: var(--surface-2);
    border-radius: var(--r-md);
    padding: 10px 12px;
    border: 1px solid var(--border-subtle);
  }
  .panel-stat-item .stat-val{
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    color: var(--text-primary);
    line-height: 1;
  }
  .panel-stat-item .stat-lbl{
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .panel-inline-row{
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
    padding: 4px 0;
  }
  .panel-inline-item { display: flex; flex-direction: column; gap: 3px; }
  .panel-inline-val{
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
  }
  .panel-inline-lbl{
    font-family: var(--font-sans);
    font-size: 9px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Flag pills — severity tiered */
  .flag-pill{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: var(--r-sm);
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    border: 1px solid;
    margin: 2px;
  }
  /* legacy flag classes */
  .flag-high, .flag-critical{
    background: rgba(220,38,38,0.12);
    color: #ff6b6b;
    border-color: rgba(220,38,38,0.35);
  }
  .flag-medium, .flag-warn{
    background: rgba(245,158,11,0.12);
    color: #F59E0B;
    border-color: rgba(245,158,11,0.35);
  }
  .flag-low, .flag-info{
    background: rgba(138,138,122,0.10);
    color: var(--text-secondary);
    border-color: rgba(138,138,122,0.20);
  }

  /* Server bar chart */
  .server-bar-row{
    display: grid;
    grid-template-columns: 90px 1fr 70px;
    gap: 8px;
    align-items: center;
    padding: 5px 0;
  }
  .server-name{
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .server-bar-track{
    background: var(--surface-3);
    border-radius: 2px;
    height: 4px;
    overflow: hidden;
  }
  .server-bar-fill{
    background: var(--brand-gold);
    height: 100%;
    border-radius: 2px;
  }
  .server-amount{
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    color: var(--text-primary);
    text-align: right;
  }

  /* ─── SCORECARD SIDE ─── */
  #scoreSide{
    width: 45%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface-base);
  }
  #scoreControls{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .ctrl-label{
    font-family: var(--font-sans);
    font-size: 9px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  #sortSelect{
    background: var(--surface-2);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    padding: 4px 8px;
    border-radius: var(--r-sm);
    font-size: var(--text-xs);
    font-family: var(--font-sans);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  #sortSelect:hover, #sortSelect:focus { border-color: var(--brand-gold); }
  #scoreList { flex: 1; overflow-y: auto; padding: 8px; }

  /* ─── COMPACT CARDS ─── */
  .compact-card{
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-1);
    border-radius: var(--r-md);
    border: 1px solid var(--border-subtle);
    border-left-width: 4px;
    padding: 10px 14px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.12s ease, border-color 0.15s ease;
    min-width: 0;
  }
  .compact-card:hover{
    background: var(--surface-3);
    transform: translateX(3px);
  }
  .compact-card.border-ok    { border-left-color: var(--status-ok); }
  .compact-card.border-warn  { border-left-color: var(--status-warn); }
  .compact-card.border-danger{ border-left-color: var(--status-alert); }
  .compact-card.highlighted{
    background: var(--surface-3);
    border-color: var(--brand-gold);
    border-left-color: var(--brand-gold) !important;
    box-shadow: 0 0 0 1px rgba(212,168,67,0.25);
  }

  /* Rank circle */
  .cc-rank{
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border-default);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .cc-rank.r1 { background: rgba(212,168,67,0.2); color: var(--brand-gold); border-color: rgba(212,168,67,0.5); }
  .cc-rank.r2 { background: #3A3A3A; color: #C0C0C0; border-color: #5A5A5A; }
  .cc-rank.r3 { background: rgba(122,69,32,0.3); color: #CD7F32; border-color: rgba(122,69,32,0.6); }

  /* Card main content */
  .cc-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .cc-name{
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .cc-sub2 {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .cc-badge{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 7px 2px 5px;
    border-radius: var(--r-full);
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid transparent;
    flex-shrink: 0;
  }
  .cc-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .cc-ok   { background: var(--status-ok-bg);   color: var(--status-ok);   border-color: rgba(34,197,94,0.25); }
  .cc-warn { background: var(--status-warn-bg);  color: var(--status-warn); border-color: rgba(245,158,11,0.25); }
  .cc-danger { background: var(--status-alert-bg); color: var(--status-alert); border-color: rgba(220,38,38,0.25); }
  .cc-ok   .cc-dot { background: var(--status-ok); }
  .cc-warn .cc-dot { background: var(--status-warn); }
  .cc-danger .cc-dot { background: var(--status-alert); animation: alertPulse 1.5s infinite; }

  .cc-sales{
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    color: var(--text-primary);
    text-align: right;
    min-width: 80px;
    letter-spacing: -0.02em;
    flex-shrink: 0;
    margin-left: auto;
  }
  .cc-flags-count{
    color: var(--text-tertiary);
    font-family: var(--font-sans);
    font-size: 9px;
    font-weight: 500;
  }
  .cc-sub { display: none; }

  /* ─── LOADING SCREEN ─── */
  #loading{
    position: fixed;
    inset: 0;
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 20px;
  }
  #loading img{
    height: 64px;
    animation: goldGlow 2s ease-in-out infinite;
  }
  #loading p{
    color: #8A8A7A;
    font-family: var(--font-sans);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* ─── ERROR BANNER ─── */
  #errorBanner{
    position: fixed;
    top: 52px;
    left: 0;
    right: 0;
    background: var(--status-alert-bg);
    color: var(--status-alert);
    padding: 10px 20px;
    text-align: center;
    z-index: 5000;
    display: none;
    font-weight: 600;
    font-size: var(--text-sm);
    border-bottom: 1px solid rgba(220,38,38,0.3);
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface-base); }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--brand-gold-dim); }

  /* ─── MAP PIN HOVER ─── */
  .leaflet-marker-icon { transition: transform 0.15s ease; cursor: pointer; }
  .leaflet-marker-icon:hover { transform: scale(1.12); }

  /* ─── RESPONSIVE ─── */
  @media(max-width:599px){
    .kpi-strip .kpi:not(:first-child):not(:last-child){ display: none; }
    #splitLayout{ flex-direction: column; }
    #mapSide{ width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border-default); }
    #scoreSide{ width: 100%; height: 55vh; }
    .compact-card{ padding: 8px 10px; }
    .cc-sales{ font-size: 16px; min-width: 64px; }
  }
  @media(min-width:600px) and (max-width:899px){
    #splitLayout{ flex-direction: column; }
    #mapSide{ width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid var(--border-default); }
    #scoreSide{ width: 100%; height: 50vh; }
  }
  @media(min-width:900px){
    #splitLayout{ flex-direction: row; }
    #mapSide{ width: 55%; height: calc(100vh - 52px); }
    #scoreSide{ width: 45%; }
  }
  @media(min-width:1400px){
    #mapSide{ width: 60%; }
    #scoreSide{ width: 40%; }
  }
</style>
</head>
<body>

<div id="loading">
  <img src="https://cdn.prod.website-files.com/6942ec7702201d9a4c1626b4/6945814389a8d77af25137bb_Logo%20white.svg" alt="Rreal Tacos">
  <p>Loading command view…</p>
</div>

<div id="errorBanner"></div>

<div id="topbar">
  <div class="logo-area">
    <img src="https://cdn.prod.website-files.com/6942ec7702201d9a4c1626b4/6945814389a8d77af25137bb_Logo%20white.svg" alt="Rreal Tacos">
  </div>
  <div class="tb-sep"></div>
  <select id="dateSelect" title="Select date"></select>
  <span id="dateBadge"></span>
  <div class="tb-sep"></div>
  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-val" id="kTotSales">—</div><div class="kpi-lbl">Net Sales</div></div>
    <div class="kpi"><div class="kpi-val" id="kCovers">—</div><div class="kpi-lbl">Covers</div></div>
    <div class="kpi"><div class="kpi-val" id="kRating">—</div><div class="kpi-lbl">★ Rating</div></div>
    <div class="kpi"><div class="kpi-val" id="kTipRate">—</div><div class="kpi-lbl">Tip Rate</div></div>
    <div class="kpi"><div class="kpi-val" id="kUnresolved">—</div><div class="kpi-lbl">Unresolved</div></div>
  </div>
  <div class="topbar-right">
    <span id="staleWarn">⚠ Stale</span>
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span class="live-label">Live</span>
    </div>
    <button id="refreshBtn">⟳ Refresh</button>
  </div>
</div>

<div id="splitLayout">
  <!-- MAP SIDE -->
  <div id="mapSide">
    <div id="mapEl"></div>
    <div id="slidePanel">
      <div id="panelContent"></div>
    </div>
  </div>

  <!-- SCORECARD SIDE -->
  <div id="scoreSide">
    <div id="scoreControls">
      <span class="ctrl-label">Sort:</span>
      <select id="sortSelect">
        <option value="sales">Sales</option>
        <option value="rating">Rating</option>
        <option value="labor">Labor Hrs</option>
        <option value="flags">Flags</option>
        <option value="tiprate">Tip Rate</option>
      </select>
      <span style="font-size:10px;color:var(--text-tertiary);margin-left:auto;font-family:var(--font-sans)">Click card or pin to sync</span>
    </div>
    <div id="scoreList"></div>
  </div>
</div>

<script>
const LOCATION_COORDS = {
  'Midtown':       [33.7793, -84.3822],
  'West Midtown':  [33.7794, -84.4156],
  'Beltline':      [33.7708, -84.3598],
  'Buckhead':      [33.8350, -84.3788],
  'Decatur':       [33.7748, -84.2963],
  'Chamblee':      [33.8896, -84.3001],
  'Sandy Springs': [33.9304, -84.3733],
  'Duluth':        [34.0029, -84.1447],
  'Cumming':       [34.2073, -84.1401],
  'Sugar Hill':    [34.1118, -84.0535],
  'Lawrenceville': [33.9562, -83.9880],
  'Woodstock':     [34.1015, -84.5194],
};

const fmt$ = n => n==null ? '—' : '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtN = (n,d=1) => n==null ? '—' : Number(n).toFixed(d);
const fmtPct = n => n==null ? '—' : Number(n).toFixed(1)+'%';
const fmtStar = n => n==null ? '—' : '★ '+Number(n).toFixed(2);
function timeAgo(d){if(!d)return'';const s=(Date.now()-new Date(d))/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function locationHealth(toastLoc, sundayLoc) {
  const flags = toastLoc?.flags?.length || 0;
  const rating = sundayLoc?.avgRating || 0;
  if (flags >= 3 || (rating > 0 && rating < 4.5)) return 'danger';
  if (flags >= 1 || (rating > 0 && rating < 4.8)) return 'warn';
  return 'ok';
}
function matchUberStore(stores, locName) {
  return stores?.find(s => s.name.replace(/^Rreal Tacos\s*/i,'').trim().toLowerCase() === locName.toLowerCase());
}

// Flag severity classifier
function flagSeverity(f) {
  const t = (f||'').toUpperCase();
  if (/MISSING|OFFLINE|ERROR|FAIL|CRITICAL|UNAVAIL|DOWN/.test(t)) return 'high';
  if (/VOID|COMP|TIP|LABOR|RATING|UBER|LOW|HIGH/.test(t)) return 'medium';
  return 'low';
}

// Auto-severity flag classifier (design brief spec)
function classifyFlag(flag) {
  const f = flag.toLowerCase();
  if (/incident|injury|hair|fire|mirror|assault|safety|urgent|critical|blood|hurt/.test(f)) return 'flag-critical';
  if (/labor|comp|void|lemon|sick|broken|missing|overdue|delay/.test(f)) return 'flag-warn';
  return 'flag-info';
}

const PIN_COLORS = {
  ok:     '#22C55E',
  warn:   '#F59E0B',
  danger: '#DC2626',
};

let DATA = {};
let MAP = null;
let markers = {};
let reports = [];
let currentDate = null;
let currentSort = 'sales';
let selectedLoc = null;

function initMap() {
  MAP = L.map('mapEl', { center: [33.92, -84.25], zoom: 10 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap ©CartoDB', maxZoom: 19
  }).addTo(MAP);
}

async function loadAll(date) {
  try {
    const [dash, uber, tips, pnl, rpts] = await Promise.all([
      fetch(date ? `/api/dashboard/all?date=${date}` : '/api/dashboard/all').then(r=>r.json()),
      fetch('/api/ubereats').then(r=>r.json()),
      fetch('/api/tipouts').then(r=>r.json()),
      fetch('/api/pnl').then(r=>r.json()),
      fetch('/api/reports/list').then(r=>r.json()),
    ]);
    DATA = { dash, uber, tips, pnl, rpts };
    reports = rpts.reports || [];
    currentDate = date || dash.toast?.businessDate;

    const generatedAt = dash.toast?.generatedAt;
    const staleEl = document.getElementById('staleWarn');
    if (generatedAt) {
      const gt = new Date(generatedAt);
      if (!isNaN(gt) && (Date.now() - gt) > 86400000) staleEl.style.display='inline';
      else staleEl.style.display='none';
    }

    populateDateDropdown();
    renderKPIs();
    renderMap();
    renderScoreList();
    document.getElementById('loading').style.display='none';
  } catch(e) {
    document.getElementById('loading').style.display='none';
    showError('Failed to load: ' + e.message);
  }
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display='none', 5000);
}

function populateDateDropdown() {
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = '';
  for (const r of reports) {
    const opt = document.createElement('option');
    opt.value = r.date;
    opt.textContent = r.label;
    if (r.date === currentDate) opt.selected = true;
    sel.appendChild(opt);
  }
  const cur = reports.find(r=>r.date===currentDate);
  document.getElementById('dateBadge').textContent = cur ? cur.label.replace(/^⚠\s*/,'') : '';
}

function renderKPIs() {
  const cs = DATA.dash?.toast?.companySummary;
  const sun = DATA.dash?.sunday?.company;
  const ov = DATA.dash?.ovation;
  document.getElementById('kTotSales').textContent = cs ? fmt$(cs.totalNetSales) : '—';
  document.getElementById('kCovers').textContent = cs ? Number(cs.totalCovers).toLocaleString() : '—';
  document.getElementById('kRating').textContent = sun ? fmtStar(sun.avgRating) : '—';
  document.getElementById('kTipRate').textContent = sun?.avgTipRate != null ? fmtPct(sun.avgTipRate) : '—';

  const unresolvedEl = document.getElementById('kUnresolved');
  const unresolvedCount = ov?.unresolvedCount ?? null;
  unresolvedEl.textContent = unresolvedCount ?? '—';
  if (unresolvedCount === null || unresolvedCount === '—') {
    unresolvedEl.style.color = '';
  } else if (unresolvedCount === 0) {
    unresolvedEl.style.color = 'var(--text-tertiary)';
  } else if (unresolvedCount <= 2) {
    unresolvedEl.style.color = 'var(--status-warn)';
  } else {
    unresolvedEl.style.color = 'var(--status-alert)';
  }
}

function renderMap() {
  for (const m of Object.values(markers)) MAP.removeLayer(m);
  markers = {};

  const locs = DATA.dash?.toast?.locations || [];
  const sunLocs = DATA.dash?.sunday?.locations || [];
  const uberStores = DATA.uber?.data?.stores || [];
  const tipLocs = DATA.tips?.data?.locations || {};
  const maxSales = Math.max(...locs.map(l => l.metrics?.netSales || 0), 1);

  for (const loc of locs) {
    const coords = LOCATION_COORDS[loc.name];
    if (!coords) continue;
    const sunLoc = sunLocs.find(s=>s.name===loc.name);
    const health = locationHealth(loc, sunLoc);
    const color = PIN_COLORS[health] || PIN_COLORS.ok;
    const sales = loc.metrics?.netSales || 0;
    const isSelected = selectedLoc === loc.name;

    // Radius scales with sales volume
    const minR = 10, maxR = 26;
    const radius = Math.round(minR + (sales / maxSales) * (maxR - minR));

    // Teardrop path: dome top, pointed bottom
    const tearH = (radius + 10) * 2.8;
    const tearW = (radius + 10) * 2;
    const cx = tearW / 2;
    const cy = tearW / 2;
    const r = radius + 2;
    const svgHtml = `<svg width="${tearW}" height="${tearH}" viewBox="0 0 ${tearW} ${tearH}" xmlns="http://www.w3.org/2000/svg">
      ${health === 'danger' ? `<circle cx="${cx}" cy="${cy}" r="${r+10}" fill="${color}" fill-opacity="0" stroke="${color}" stroke-width="2">
        <animate attributeName="r" from="${r+4}" to="${r+16}" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" from="0.8" to="0" dur="1.5s" repeatCount="indefinite"/>
      </circle>` : ''}
      <path d="M${cx},${tearH-4} C${cx-tearW*0.1},${tearH*0.6} ${cx-tearW*0.5},${cy*0.9} ${cx-tearW*0.5},${cy} A${tearW*0.5},${tearW*0.5} 0 1 1 ${cx+tearW*0.5},${cy} C${cx+tearW*0.5},${cy*0.9} ${cx+tearW*0.1},${tearH*0.6} ${cx},${tearH-4} Z"
        fill="${isSelected ? '#D4A843' : color}" fill-opacity="0.92" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#fff" font-size="${Math.max(8, r*0.45)}px"
        font-weight="700" font-family="'Fira Code',monospace">${fmt$(sales)}</text>
    </svg>`;

    const labelHtml = `<div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;font-weight:600;color:#F0EDE8;text-shadow:0 1px 3px rgba(0,0,0,0.9),0 0 8px rgba(0,0,0,0.6);font-family:'Fira Sans',sans-serif;letter-spacing:0.03em">${loc.name}</div>`;

    const icon = L.divIcon({
      html: `<div style="position:relative;width:${tearW}px;height:${tearH+18}px">
        <div style="width:${tearW}px;height:${tearH}px;display:flex;align-items:center;justify-content:center">${svgHtml}</div>
        ${labelHtml}
      </div>`,
      className: '',
      iconSize: [tearW, tearH + 18],
      iconAnchor: [tearW / 2, tearH + 18],
    });

    const marker = L.marker(coords, { icon }).addTo(MAP);
    marker.bindTooltip(`<b>${loc.name}</b><br>${fmt$(sales)}`, { offset: [0, -tearH] });

    marker.on('click', () => {
      selectedLoc = loc.name;
      renderMap();
      openPanel(loc, sunLoc, uberStores, tipLocs, health, color);
      highlightCard(loc.name);
    });

    markers[loc.name] = marker;
  }
}

function renderScoreList() {
  const locs = DATA.dash?.toast?.locations || [];
  const sunLocs = DATA.dash?.sunday?.locations || [];
  const uberStores = DATA.uber?.data?.stores || [];

  const sorted = [...locs].sort((a, b) => {
    const sA_sun = sunLocs.find(s=>s.name===a.name);
    const sB_sun = sunLocs.find(s=>s.name===b.name);
    switch (currentSort) {
      case 'sales': return (b.metrics?.netSales||0) - (a.metrics?.netSales||0);
      case 'rating': return (sB_sun?.avgRating||0) - (sA_sun?.avgRating||0);
      case 'labor': return (b.labor?.totalLaborHours||0) - (a.labor?.totalLaborHours||0);
      case 'flags': return (b.flags?.length||0) - (a.flags?.length||0);
      case 'tiprate': return (sB_sun?.tipRate||0) - (sA_sun?.tipRate||0);
      default: return 0;
    }
  });

  const list = document.getElementById('scoreList');
  list.innerHTML = '';

  sorted.forEach((loc, idx) => {
    const rank = idx + 1;
    const sunLoc = sunLocs.find(s=>s.name===loc.name);
    const health = locationHealth(loc, sunLoc);
    const flagCount = loc.flags?.length || 0;

    const card = document.createElement('div');
    card.className = `compact-card border-${health}`;
    card.dataset.name = loc.name;
    if (selectedLoc === loc.name) card.classList.add('highlighted');

    const statusColor = health === 'ok' ? 'var(--status-ok)' : health === 'warn' ? 'var(--status-warn)' : 'var(--status-alert)';
    const badgeLabel = health === 'ok' ? 'Healthy' : health === 'warn' ? 'Watch' : 'Alert';
    const dotHtml = `<span style="width:6px;height:6px;border-radius:50%;background:${statusColor};display:inline-block;margin-right:4px;${health==='danger'?'animation:alertPulse 1.5s infinite':''}"></span>`;
    const ratingStr = sunLoc?.avgRating ? `<span style="color:var(--status-warn);font-size:10px;font-family:var(--font-mono)">★ ${Number(sunLoc.avgRating).toFixed(2)}</span>` : '';
    const flagBadge = flagCount > 0 ? `<span style="color:var(--status-alert);font-size:9px;font-family:var(--font-sans)">⚑ ${flagCount}</span>` : '';

    card.innerHTML = `
      <div class="cc-rank ${rank<=3?'r'+rank:''}">${rank}</div>
      <div class="cc-main">
        <div class="cc-name">${loc.name}</div>
        <div class="cc-sub2">
          <span class="cc-badge cc-${health}">${dotHtml}${badgeLabel}</span>
          ${ratingStr}
          ${flagBadge}
        </div>
      </div>
      <div class="cc-sales">${fmt$(loc.metrics?.netSales)}</div>`;

    card.addEventListener('click', () => {
      selectedLoc = loc.name;
      renderScoreList();
      pulseMapPin(loc.name);
      const sunLocForPanel = sunLocs.find(s=>s.name===loc.name);
      const tipLocs = DATA.tips?.data?.locations || {};
      openPanel(loc, sunLocForPanel, uberStores, tipLocs, health, PIN_COLORS[health]);
    });

    list.appendChild(card);
  });
}

function highlightCard(locName) {
  document.querySelectorAll('.compact-card').forEach(c => {
    c.classList.toggle('highlighted', c.dataset.name === locName);
  });
  const target = document.querySelector(`.compact-card[data-name="${locName}"]`);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function pulseMapPin(locName) {
  const marker = markers[locName];
  if (!marker) return;
  const coords = LOCATION_COORDS[locName];
  if (coords) MAP.flyTo(coords, Math.max(MAP.getZoom(), 11), { duration: 0.8 });
}

function openPanel(loc, sunLoc, uberStores, tipLocs, health, color) {
  const m = loc.metrics;
  const lm = loc.labor;
  const uberStore = matchUberStore(uberStores, loc.name);
  const tipLoc = tipLocs[loc.name];

  const badgeCls = health === 'ok' ? 'badge-healthy' : health === 'warn' ? 'badge-warning' : 'badge-critical';
  const badgeLabel = health === 'ok' ? 'On Track' : health === 'warn' ? 'Watch' : 'Alert';

  // Status dot for badge
  const statusColor = health === 'ok' ? 'var(--status-ok)' : health === 'warn' ? 'var(--status-warn)' : 'var(--status-alert)';
  const dotHtml = `<span style="width:6px;height:6px;border-radius:50%;background:${statusColor};display:inline-block;margin-right:4px;${health==='danger'?'animation:alertPulse 1.5s infinite':''}"></span>`;

  // Flag pills with auto-severity (classifyFlag)
  const flags = (loc.flags || []);
  const flagHtml = flags.length
    ? flags.map(f => `<span class="flag-pill ${classifyFlag(f)}">${f}</span>`).join('')
    : `<span style="color:var(--text-tertiary);font-size:var(--text-xs);font-family:var(--font-sans)">No active flags</span>`;

  // Uber status
  const uberStatus = uberStore ? (uberStore.today?.online ? '🟢 Online' : '🔴 Offline') : '—';
  const uberSales = uberStore?.today?.sales ? fmt$(uberStore.today.sales) : '—';

  // Labor color
  const laborPct = lm?.laborPct;
  const laborColor = laborPct == null ? 'var(--text-primary)' : laborPct < 20 ? 'var(--status-ok)' : laborPct <= 25 ? 'var(--status-warn)' : 'var(--status-alert)';

  // Top servers mini bar chart
  let serverHtml = '<div style="color:var(--text-tertiary);font-size:var(--text-xs);font-family:var(--font-sans)">No data</div>';
  if (tipLoc?.servers?.length) {
    const sorted = [...tipLoc.servers].sort((a,b)=>(b.totalPayout||0)-(a.totalPayout||0)).slice(0,5);
    const maxPayout = sorted[0]?.totalPayout || 1;
    serverHtml = sorted.map(s => {
      const pct = Math.round(((s.totalPayout||0) / maxPayout) * 100);
      return `<div class="server-bar-row">
        <div class="server-name">${s.firstName} ${s.lastName||''}</div>
        <div class="server-bar-track"><div class="server-bar-fill" style="width:${pct}%"></div></div>
        <div class="server-amount">${fmt$(s.totalPayout)}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('panelContent').innerHTML = `
    <!-- Zone 1: Header -->
    <div class="panel-header">
      <div class="panel-header-top">
        <div class="panel-name">${loc.name}</div>
        <button class="panel-close-btn" onclick="document.getElementById('slidePanel').classList.remove('open');selectedLoc=null;renderMap();renderScoreList();" title="Close">✕</button>
      </div>
      <div>
        <span class="status-badge ${badgeCls}">
          <span class="status-dot"></span>${badgeLabel}
        </span>
      </div>
    </div>

    <!-- Zone 2: Hero KPI Grid — Net Sales, Covers, Avg/Guest, Labor% -->
    <div class="panel-hero-grid">
      <div class="panel-hero-kpi">
        <div class="value">${fmt$(m?.netSales)}</div>
        <div class="label">Net Sales</div>
      </div>
      <div class="panel-hero-kpi">
        <div class="value">${m?.coverCount!=null?Number(m.coverCount).toLocaleString():'—'}</div>
        <div class="label">Covers</div>
      </div>
      <div class="panel-hero-kpi">
        <div class="value">${fmt$(m?.avgPerGuest)}</div>
        <div class="label">Avg / Guest</div>
      </div>
      <div class="panel-hero-kpi">
        <div class="value" style="color:${laborColor}">${laborPct!=null?fmtPct(laborPct):'—'}</div>
        <div class="label">Labor %</div>
      </div>
    </div>

    <!-- Daypart -->
    <div class="panel-section-header">Daypart</div>
    <div class="panel-section-content">
      <div class="panel-stat-grid">
        <div class="panel-stat-item">
          <div class="stat-val">${fmt$(m?.daypart?.lunch?.sales)}</div>
          <div class="stat-lbl">Lunch</div>
        </div>
        <div class="panel-stat-item">
          <div class="stat-val">${fmt$(m?.daypart?.dinner?.sales)}</div>
          <div class="stat-lbl">Dinner</div>
        </div>
      </div>
    </div>

    <!-- Sunday Pay -->
    <div class="panel-section-header">Sunday Pay</div>
    <div class="panel-section-content">
      <div class="panel-stat-grid">
        <div class="panel-stat-item">
          <div class="stat-val" style="color:var(--status-warn)">${fmtStar(sunLoc?.avgRating)}</div>
          <div class="stat-lbl">Rating</div>
        </div>
        <div class="panel-stat-item">
          <div class="stat-val">${sunLoc?.adoption!=null?fmtPct(sunLoc.adoption):'—'}</div>
          <div class="stat-lbl">Adoption</div>
        </div>
        <div class="panel-stat-item">
          <div class="stat-val">${sunLoc?.tipRate!=null?fmtPct(sunLoc.tipRate):'—'}</div>
          <div class="stat-lbl">Tip Rate</div>
        </div>
        <div class="panel-stat-item">
          <div class="stat-val">${sunLoc?.totalReviews??'—'}</div>
          <div class="stat-lbl">Reviews</div>
        </div>
      </div>
    </div>

    <!-- Quality -->
    <div class="panel-section-header">Quality</div>
    <div class="panel-section-content">
      <div class="panel-stat-grid">
        <div class="panel-stat-item">
          <div class="stat-val">${fmtPct(m?.voids?.pct)}</div>
          <div class="stat-lbl">Voids %</div>
        </div>
        <div class="panel-stat-item">
          <div class="stat-val">${fmtPct(m?.comps?.pct)}</div>
          <div class="stat-lbl">Comps %</div>
        </div>
      </div>
    </div>

    <!-- Labor & Uber -->
    <div class="panel-section-header">Labor &amp; Delivery</div>
    <div class="panel-section-content">
      <div class="panel-inline-row">
        <div class="panel-inline-item">
          <div class="panel-inline-val" style="color:${laborColor}">${laborPct!=null?fmtPct(laborPct):'—'}</div>
          <div class="panel-inline-lbl">Labor %</div>
        </div>
        <div class="panel-inline-item">
          <div class="panel-inline-val">${lm?.currentlyClockedCount??'—'}</div>
          <div class="panel-inline-lbl">Clocked In</div>
        </div>
        <div class="panel-inline-item">
          <div class="panel-inline-val">${uberStatus}</div>
          <div class="panel-inline-lbl">UberEats</div>
        </div>
        <div class="panel-inline-item">
          <div class="panel-inline-val">${uberSales}</div>
          <div class="panel-inline-lbl">Uber Sales</div>
        </div>
      </div>
    </div>

    <!-- Flags -->
    <div class="panel-section-header">Flags</div>
    <div class="panel-section-content">
      <div>${flagHtml}</div>
    </div>

    <!-- Zone 3: Top Servers -->
    <div class="panel-section-header">Top Servers</div>
    <div class="panel-section-content">
      ${serverHtml}
    </div>`;

  document.getElementById('slidePanel').classList.add('open');
}

// Controls
document.getElementById('dateSelect').addEventListener('change', function() { loadAll(this.value); });
document.getElementById('refreshBtn').addEventListener('click', () => { const d = document.getElementById('dateSelect').value; loadAll(d); });
document.getElementById('sortSelect').addEventListener('change', function() {
  currentSort = this.value;
  renderScoreList();
});

// Boot — failsafe: hide loading after 10s no matter what
setTimeout(() => { const l = document.getElementById('loading'); if(l) l.style.display='none'; }, 10000);
initMap();
fetch('/api/reports/list').then(r=>r.json()).then(d=>{
  const rpts = d.reports || [];
  const first = rpts.find(r=>!r.partial) || rpts[0];
  loadAll(first?.date || null);
}).catch(()=>loadAll(null));
</script>
</body>
</html>
